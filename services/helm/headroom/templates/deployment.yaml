apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headroom.fullname" . }}
  labels:
    {{- include "headroom.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "headroom.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "headroom.labels" . | nindent 8 }}
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch

      serviceAccountName: {{ include "headroom.fullname" . }}

      {{- if .Values.dopplerConfig }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- end }}

      containers:
        - name: headroom
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - headroom
            - proxy
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8787"
            - --backend
            - "openrouter"

          envFrom:
            - configMapRef:
                name: {{ include "headroom.fullname" . }}-config
            - secretRef:
                name: {{ include "headroom.fullname" . }}-secrets

          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: data
              mountPath: /home/nonroot/.headroom

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "headroom.fullname" . }}-data

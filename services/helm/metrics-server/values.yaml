metrics-server:
  replicas: 3
  # default port - prevents: https://github.com/kubernetes-sigs/metrics-server/issues/1064
  containerPort: 10250
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
    limits:
      memory: 500Mi
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  args: ["--kubelet-insecure-tls"]

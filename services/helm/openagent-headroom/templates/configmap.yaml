apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openagent-headroom.fullname" . }}-config
  labels:
    {{- include "openagent-headroom.labels" . | nindent 4 }}
data:
  HEADROOM_HOST: "0.0.0.0"
  HEADROOM_PORT: "{{ .Values.service.port }}"
  HEADROOM_MODE: "optimize"
  HEADROOM_TELEMETRY: "off"

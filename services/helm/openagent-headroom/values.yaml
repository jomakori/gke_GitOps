# ┌──────────────────────────────────────────────────────────────────┐
# │ openagent-headroom — proxy-based multi-LLM provider             │
# │                                                                  │
# │ Image: ghcr.io/chopratejas/headroom:latest                         │
# -- Container image (official Headroom from GHCR)
image:
  repository: ghcr.io/chopratejas/headroom
  tag: "latest"
  pullPolicy: IfNotPresent

# -- Service settings (proxy port)
service:
  port: 8787

# -- Resource requests/limits
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- VPA scaling
vpa:
  enabled: true
  minAllowed:
    cpu: 100m
    memory: 256Mi
  maxAllowed:
    cpu: 3
    memory: 6Gi
  controlledResources: ["cpu", "memory"]
  updatePolicy:
    updateMode: "Auto"

# -- LiteLLM proxy endpoint (overrides Doppler OPENAI_TARGET_API_URL)
litellmUrl: "http://litellm-openagent-litellm.openagent.svc.cluster.local:4000/v1"

# -- Storage for Headroom SQLite CCR cache
storage:
  size: 2Gi
  storageClass: ""
  accessMode: ReadWriteOnce

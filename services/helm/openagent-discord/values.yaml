# ┌──────────────────────────────────────────────────────────────────┐
# │ OpenAgent Discord bot                                            │
# │                                                                  │
# │ Image: ghcr.io/jomakori/gke_gitops/kagent-discord-bot            │
# │                                                                  │
# │ Go-based bot that listens to Discord and forwards messages       │
# │ to an A2A agent via HTTP. Exposes /healthz on port 8080.         │
# └──────────────────────────────────────────────────────────────────┘

# -- Doppler config; set by ArgoCD appset. Creates ExternalSecret when present.
#    Expected keys: DISCORD_BOT_TOKEN, DISCORD_BOT_CLIENT_ID
dopplerConfig: ""

# -- Container image
image:
  repository: ghcr.io/jomakori/gke_gitops/openagent-discord-bot
  tag: "0.2.0"
  pullPolicy: IfNotPresent

# -- Service settings
service:
  port: 8080

# -- Resource requests/limits
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Discord bot configuration
config:
  # -- A2A endpoint URL (A2A protocol mode). Leave empty to use K8s API mode.
  agentA2aUrl: ""
  # -- Agent ref (K8s API mode). Instance name for CRD-based orchestrators.
  agentRef: ""
  # -- Agent ID (K8s API mode).
  agentId: ""
  # -- Model name for agent runs (K8s API mode).
  agentModel: ""
  # -- Model provider (K8s API mode, e.g. "openai", "deepseek").
  agentModelProvider: ""
  # -- Agent namespace for CRD creation (K8s API mode, default: default).
  agentNamespace: ""
  # -- Comma-separated skill pack refs (K8s API mode).
  agentSkills: ""
  # -- Only respond to messages mentioning the bot
  mentionOnly: true
  # -- Restrict to a specific Discord channel (empty = all channels)
  channelOnly: ""
  # -- Conversation mode: "threaded" or "dm"
  conversationMode: "threaded"
  # -- Phase transition updates
  phaseUpdates: true
  # -- Poll-based UI for direct questions
  pollUI: true
  # -- Discord channel ID to send startup/online announcement
  startupChannel: "chat"
  # -- Discord application client ID (public, for invite URL diagnostics)
  clientId: ""

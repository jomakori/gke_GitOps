apiVersion: apps/v1
kind: Deployment
metadata:
  name: openagent-discord
  labels:
    {{- include "openagent-discord.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: openagent-discord
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openagent-discord
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      serviceAccountName: openagent-discord

      {{- if .Values.dopplerConfig }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- end }}

      containers:
        - name: discord-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openagent-discord-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_BOT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openagent-discord-secrets
                  key: DISCORD_BOT_CLIENT_ID
            # Agent backend — set AGENT_A2A_URL for A2A protocol, or
            # AGENT_REF + AGENT_ID for direct Kubernetes API (CRD-based).
            {{- if .Values.config.agentA2aUrl }}
            - name: AGENT_A2A_URL
              value: {{ .Values.config.agentA2aUrl | quote }}
            {{- end }}
            {{- if .Values.config.agentRef }}
            - name: AGENT_REF
              value: {{ .Values.config.agentRef | quote }}
            - name: AGENT_ID
              value: {{ .Values.config.agentId | quote }}
            - name: AGENT_MODEL
              value: {{ .Values.config.agentModel | quote }}
            - name: AGENT_MODEL_PROVIDER
              value: {{ .Values.config.agentModelProvider | quote }}
            - name: AGENT_NAMESPACE
              value: {{ .Values.config.agentNamespace | quote }}
            {{- if .Values.config.agentSkills }}
            - name: AGENT_SKILLS
              value: {{ .Values.config.agentSkills | quote }}
            {{- end }}
            {{- end }}
            - name: DISCORD_MENTION_ONLY
              value: {{ .Values.config.mentionOnly | quote }}
            - name: DISCORD_CONVERSATION_MODE
              value: {{ .Values.config.conversationMode | quote }}
            - name: DISCORD_PHASE_UPDATES
              value: {{ .Values.config.phaseUpdates | quote }}
            - name: DISCORD_POLL_UI
              value: {{ .Values.config.pollUI | quote }}
            {{- if .Values.config.channelOnly }}
            - name: DISCORD_CHANNEL_ONLY
              value: {{ .Values.config.channelOnly | quote }}
            {{- end }}
            {{- if .Values.config.startupChannel }}
            - name: DISCORD_STARTUP_CHANNEL
              value: {{ .Values.config.startupChannel | quote }}
            {{- end }}
            {{- if .Values.config.clientId }}
            - name: DISCORD_CLIENT_ID
              value: {{ .Values.config.clientId | quote }}
            {{- end }}

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

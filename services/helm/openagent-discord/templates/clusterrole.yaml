{{- if .Values.config.agentRef }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openagent-discord.fullname" . }}
  labels:
    {{- include "openagent-discord.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sympozium.ai"]
    resources: ["agentruns"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openagent-discord.fullname" . }}
  labels:
    {{- include "openagent-discord.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openagent-discord.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: openagent-discord
    namespace: {{ .Release.Namespace }}
{{- end }}

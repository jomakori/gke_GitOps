  tier: quick
  domain: git
  primary_agent: opencrust
  loop_depth: shallow
  verification: V2
  gates:
    ask_user: false
    require_confirmation: true
notes: External side effect (production deployment). Must confirm.
```

## Re-Entry Tests (don't re-classify)

```yaml
test_id: reentry-001
description: Confirmation turn
input: "Yes, go ahead with the refactor"
context: User previously asked "Should I refactor the auth layer?" and agent proposed a plan.
expected:
  tier: trivial
  domain: general
  primary_agent: sisyphus-junior
  loop_depth: direct
  verification: V1
  gates:
    ask_user: false
    require_confirmation: false
notes: Confirmation of prior decision. Do NOT re-classify. Execute.
```

```yaml
test_id: reentry-002
description: Already in context
input: "What was the ArgoCD sync wave for kagent again?"
context: Agent explained sync waves 2 turns ago.
expected:
  tier: trivial
  domain: general
  primary_agent: sisyphus-junior
  loop_depth: direct
  verification: V1
  gates:
    ask_user: false
    require_confirmation: false
notes: Answer is in context window. Return directly.
```

## Running the Tests

These tests should be run against the Sisyphus agent's classification logic. For each test:

1. Feed the input (+ context if provided) to Sisyphus
2. Capture the classification output
3. Compare against expected tier, domain, and gates
4. Log mismatches for prompt refinement

A passing rate of >90% indicates the classification prompt is well-tuned.

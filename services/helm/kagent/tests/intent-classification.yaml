# Kagent Intent Classification Test Suite

Tests for Sisyphus inline intent classification. Each test is a conversation turn that should be classified into a specific tier.

## Test Format

```yaml
test_id: <string>
description: <what this test verifies>
input: <user message>
expected:
  tier: <trivial|quick|scoped|exploratory|complex|ambiguous>
  domain: <visual|logic|writing|research|git|general>
  primary_agent: <agent_name>
  loop_depth: <direct|shallow|deep|full>
  verification: <V1|V2|V3>
  gates:
    ask_user: <true|false>
    require_confirmation: <true|false>
notes: <why this classification is correct>
```


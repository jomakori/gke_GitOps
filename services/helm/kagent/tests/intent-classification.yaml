  domain: general
  primary_agent: sisyphus-junior
  loop_depth: direct
  verification: V1
  gates:
    ask_user: false
    require_confirmation: false
notes: Single file, single line, obvious fix. No planning needed.
```

```yaml
test_id: trivial-002

## Ambiguous Tests (0 agents, ask user)

```yaml
test_id: ambiguous-001
description: Vague request
input: "Make it better"
expected:
  tier: ambiguous
  domain: general
  primary_agent: ""
  loop_depth: direct
  verification: V1
  gates:
    ask_user: true
    require_confirmation: false
notes: No target, no criteria. Must ask for clarification.
```

```yaml
test_id: ambiguous-002
description: Conflicting signals
input: "Quick fix: rewrite the entire auth system"
expected:
  tier: ambiguous
  domain: general
  primary_agent: ""
  loop_depth: direct
  verification: V1
  gates:
    ask_user: true
    require_confirmation: false
notes: "Quick fix" contradicts "entire auth system". Clarify scope.
```

```yaml
test_id: ambiguous-003
description: Missing critical info
input: "Deploy the fix to production"
expected:
  tier: ambiguous
  domain: general
  primary_agent: ""
  loop_depth: direct
  verification: V1
  gates:
    ask_user: true
    require_confirmation: true
notes: Which fix? Which branch? Production deployment needs confirmation.
```


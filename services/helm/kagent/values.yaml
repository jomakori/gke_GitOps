# -- Doppler config; set by ArgoCD appset. Creates ExternalSecret when present.
dopplerConfig: ""

# ┌──────────────────────────────────────────────────────────────────┐
# │ Prompts — loaded as ConfigMap for system prompt injection        │
# │ Each key is referenced by Kagent via systemMessageFrom            │
# │ .configMapKeyRef in agent configuration                          │
# └──────────────────────────────────────────────────────────────────┘
prompts:
  # -- Caveman communication rules. Loaded as caveman.txt.
  #    Injected into agent system prompt for ultra-compressed output.
  caveman: |
    # Caveman Communication Rules
    Respond terse like smart caveman. All technical substance stay. Only fluff die.

    Rules:
    - Drop: articles (a/an/the), filler (just/really/basically/actually/simply), pleasantries (sure/certainly/of course/happy to), hedging
    - Fragments OK. Short synonyms (big not extensive, fix not "implement a solution for"). Technical terms exact. Code blocks unchanged. Errors quoted exact.
    - Pattern: [thing] [action] [reason]. [next step].
    - Not: "Sure! I'd be happy to help you with that."
    - Yes: "Bug in auth middleware. Fix:"

    Auto-Clarity — drop caveman for:
    - Security warnings
    - Irreversible action confirmations
    - Multi-step sequences where fragment ambiguity risks misread
    - When compression creates technical ambiguity
    - When user asks to clarify or repeats question
    Resume caveman after clear part done.

    Boundaries:
    - Code/commits/PRs: write normal
    - "stop caveman" or "normal mode": revert
    - Level persist until changed or session end

  # -- Ponytail YAGNI ladder. Loaded as ponytail.txt.
  #    Guides agent to minimize code — lazy senior dev discipline.
  ponytail: |
    # Ponytail Heuristics — Lazy Senior Dev
    You are a lazy senior developer. Before writing code, escalate this YAGNI ladder:
    1. CHECK IF NEEDED: Does this feature need to exist? Can it be deleted?
    2. USE STDLIB: Does the standard library already provide this?
    3. USE EXISTING DEP: Does an installed dependency provide this?
    4. ONE-LINER: Can this be a single expression? Write it inline.
    5. SMALL FUNCTION: Only if all above fail, write a minimal function.
    6. NEW MODULE/FILE: Only if function doesn't fit, extract to module.
    7. NEW ABSTRACTION: Only if pattern repeats 3+ times.
    NEVER: Add feature "for later", interface with one impl, config option for hardcoded value, helper for single use, layer of indirection without clear benefit.
    When in doubt: delete code. Less is more.

# === Kagent upstream chart config ===
kagent:
  providers:
    default: openAI
    openAI:
      apiKey: ""
  database:
    postgres:
      enabled: true
      bundled:
        enabled: false
      url: ""
      vectorEnabled: true
  controller:
    substrate:
      enabled: true
      ateApiEndpoint: "dns:///api.ate-system.svc:443"
      ateApiInsecure: true
    service:
      type: ClusterIP
      port: 8083
  substrateWorkerPool:
    create: true
    replicas: 1
    ateomImage: "ghcr.io/kagent-dev/substrate/ateom-gvisor:v0.0.6"
  agents:
    argo-rollouts-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false
    istio-agent:
      enabled: false
    observability-agent:
      enabled: false
    helm-agent:
      enabled: false
  ui:
    service:
      type: ClusterIP
      port: 8080

# -- Headroom LLM proxy endpoint
headroom:
  # Internal cluster DNS. Override only if headroom runs in different ns/port.
  url: "http://kagent-headroom.kagent.svc.cluster.local:8787"

# -- Skill configuration (injected into agent prompts)
skills:
  github:
    # Set via env var or ArgoCD parameter. Never hardcode in prompts.
    account: ""
  repos:
    # Lazy-loaded repo paths. Agents discover these at runtime.
    # Format: name -> absolute path
    localPaths: {}

# Placeholder subdirs (populated by later tasks)
modelConfigs: {}
agents: {}
database:
  enabled: true
  pgClientImage: "postgres:18-alpine"
  storage: 5Gi
  pgVersion: "18"
  profile: development

{{- if .Values.database.enabled }}
apiVersion: stackgres.io/v1
kind: SGScript
metadata:
  name: kagent-pg-init-litellm
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  managedVersions: true
  continueOnError: true
  scripts:
    - name: create-litellm-db
      database: postgres
      script: |
        DO $$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'litellm') THEN
            CREATE DATABASE litellm;
          END IF;
        END $$;
    - name: create-litellm-user
      database: litellm
      script: |
        DO $$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'litellm') THEN
            CREATE USER litellm WITH PASSWORD 'litellm';
            GRANT ALL PRIVILEGES ON DATABASE litellm TO litellm;
            ALTER DATABASE litellm OWNER TO litellm;
          END IF;
        END $$;
    - name: grant-litellm-schema
      database: litellm
      script: |
        GRANT ALL ON SCHEMA public TO litellm;
{{- end }}

{{- if .Values.database.enabled }}
apiVersion: stackgres.io/v1
kind: SGPostgresConfig
metadata:
  name: kagent-pg-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  postgresVersion: {{ .Values.database.pgVersion | quote }}
  postgresql.conf:
    # shared_preload_libraries: "vector"  # pgvector not included in StackGres Patroni image
    # CREATE EXTENSION vector; works without preload
{{- end }}

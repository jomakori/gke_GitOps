{{- if .Values.database.enabled }}
apiVersion: stackgres.io/v1
kind: SGPostgresConfig
metadata:
  name: kagent-pg-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  postgresVersion: {{ .Values.database.pgVersion | quote }}
  postgresql.conf:
    {}
  # Note: pgvector shared library not available in StackGres Patroni image.
  # shared_preload_libraries left at default: pg_stat_statements, auto_explain
{{- end }}

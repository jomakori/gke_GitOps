{{- if .Values.database.enabled }}
apiVersion: stackgres.io/v1
kind: SGPostgresConfig
metadata:
  name: kagent-pg-config
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  postgresVersion: {{ .Values.database.pgVersion | quote }}
  postgresql.conf:
    {}
  # Note: pgvector is loaded via StackGres dynamic extension mechanism
  # (spec.postgres.extensions in SGCluster). No shared_preload_libraries needed
  # for pgvector — it's a simple extension loaded via CREATE EXTENSION.
{{- end }}

{{- if .Values.database.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: kagent-pg-init-vector
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-vector
          image: "{{ .Values.database.pgClientImage }}"
          command:
            - bash
            - -ce
            - |
              until pg_isready -h kagent-pg -U "${PGUSER}"; do
                echo "waiting for postgres..."
                sleep 3
              done
              psql -h kagent-pg -U "${PGUSER}" -d "${PGDATABASE}" -c "CREATE EXTENSION IF NOT EXISTS vector;"
              echo "pgvector extension enabled on ${PGDATABASE} database"
              psql -h kagent-pg -U "${PGUSER}" -d "${PGDATABASE}" -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'kagent'" \
                | grep -q 1 \
                || psql -h kagent-pg -U "${PGUSER}" -d "${PGDATABASE}" -c "CREATE DATABASE kagent;"
              echo "kagent database ensured"
              psql -h kagent-pg -U "${PGUSER}" -d "kagent" -c "CREATE EXTENSION IF NOT EXISTS vector;"
              echo "pgvector extension enabled on kagent database"
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: kagent-pg
                  key: superuser-username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: kagent-pg
                  key: superuser-password
            - name: PGDATABASE
              value: postgres
  backoffLimit: 10
  ttlSecondsAfterFinished: 3600
{{- end }}

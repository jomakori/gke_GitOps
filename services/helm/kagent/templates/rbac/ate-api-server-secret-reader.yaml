{{- if .Values.dopplerConfig }}
# Grant ate-api-server ServiceAccount read access to agent secrets.
# Required because SandboxAgent env references secretKeyRef (e.g. KAGENT_CONFIG_JSON).
# The upstream substrate chart intentionally does NOT grant cluster-wide secret read
# access — each tenant is responsible for per-namespace RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ate-api-server-secret-reader
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ate-api-server-secret-reader
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: kagent-substrate-ate-api-server
  namespace: ate-system
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ate-api-server-secret-reader
{{- end }}

apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: opencode-big-pickle
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  model: opencode/big-pickle
  provider: OpenAI
  baseUrl: http://headroom.kagent.svc.cluster.local:8787
  apiKeySecret:
    name: kagent-secrets
    key: OPENAI_API_KEY

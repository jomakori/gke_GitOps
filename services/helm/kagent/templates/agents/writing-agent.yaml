apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: writing-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  type: Declarative
  description: "Documentation and prose agent, invoked by Sisyphus for writing tasks"
  declarative:
    runtime: go
    modelConfig: google-gemini-3-5-flash
    systemMessageFrom:
      name: kagent-prompts
      key: writing-agent-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

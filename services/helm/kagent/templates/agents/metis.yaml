apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: metis
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: primary
    agent-role: planner
spec:
  type: Declarative
  description: "Pre-planning consultant. Identify hidden intentions, ambiguities, AI failure points."
  declarative:
    runtime: go
    modelConfig: opencode-big-pickle
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: metis-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

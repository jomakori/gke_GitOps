apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: ultrabrain-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  type: Declarative
  description: "High-difficulty reasoning agent, invoked by Sisyphus for maximum-intelligence tasks"
  declarative:
    runtime: go
    modelConfig: anthropic-claude-opus-4-7
    systemMessageFrom:
      name: kagent-prompts
      key: ultrabrain-agent-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

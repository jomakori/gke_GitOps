apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: oracle
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: primary
    agent-role: architect
spec:
  type: Declarative
  description: "Read-only architecture/security consultant."
  declarative:
    runtime: go
    modelConfig: opencode-big-pickle
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: oracle-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

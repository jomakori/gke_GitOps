apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: sisyphus-junior-fb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
    agent-type: fallback
    agent-role: worker
spec:
  type: Declarative
  description: "Fallback sub-worker. Serves as backup when sisyphus-junior primary model fails."
  declarative:
    runtime: go
    modelConfig: opencode-big-pickle
    systemMessageFrom:
      name: kagent-prompts
      key: sisyphus-junior-fb-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

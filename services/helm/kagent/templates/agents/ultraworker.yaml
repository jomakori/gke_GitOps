apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: ultraworker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: primary
    agent-role: worker
spec:
  type: Declarative
  description: "Heavy-lifting sub-worker. Deep implementation."
  declarative:
    runtime: go
    modelConfig: opencode-big-pickle
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: ultraworker-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

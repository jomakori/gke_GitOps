apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: multimodal-looker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: primary
    agent-role: worker
spec:
  type: Declarative
  description: "Visual task agent. Interpret screenshots, diagrams, PDFs."
  declarative:
    runtime: go
    modelConfig: opencode-mimo-v2-5-free
    systemMessageFrom:
      name: kagent-prompts
      key: multimodal-looker-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

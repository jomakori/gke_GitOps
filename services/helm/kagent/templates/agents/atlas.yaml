apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: atlas
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: primary
    agent-role: orchestrator
spec:
  type: Declarative
  description: "Master orchestrator. Coordinate agents, verify work."
  declarative:
    runtime: go
    modelConfig: opencode-big-pickle
    systemMessageFrom:
      name: kagent-prompts
      key: atlas-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: opencrust-fb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: fallback
    agent-role: worker
spec:
  type: Declarative
  description: "Fallback code generator. Same role as opencrust, different model."
  declarative:
    runtime: go
    modelConfig: moonshotai-kimi-k2-6
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: opencrust-fb-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: hephaestus-fb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
    agent-type: fallback
    agent-role: worker
spec:
  type: Declarative
  description: "Fallback implementation coder. Serves as backup when hephaestus primary model fails."
  declarative:
    runtime: go
    modelConfig: moonshotai-kimi-k2-6
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: hephaestus-fb-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

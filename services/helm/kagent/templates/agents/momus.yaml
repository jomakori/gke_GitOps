apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: momus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
    agent-type: primary
    agent-role: reviewer
spec:
  type: Declarative
  description: "Ruthless plan reviewer. Identifies gaps, risks, and ambiguities in implementation plans."
  declarative:
    runtime: go
    modelConfig: moonshotai-kimi-k2-6
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: momus-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

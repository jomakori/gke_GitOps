apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: multimodal-looker-fb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: fallback
    agent-role: worker
spec:
  type: Declarative
  description: "Fallback visual task agent when primary vision model fails"
  declarative:
    runtime: go
    modelConfig: anthropic-claude-opus-4-7
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: multimodal-looker-fb-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

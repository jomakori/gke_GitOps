apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: sisyphus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: primary
    agent-role: orchestrator
spec:
  type: Declarative
  description: "Main orchestrator. Parse intake, plan, delegate via A2A."
  declarative:
    runtime: go
    modelConfig: opencode-big-pickle
    systemMessageFrom:
      name: kagent-prompts
      key: sisyphus-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: atlas-fb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kagent
    agent-type: fallback
    agent-role: orchestrator
spec:
  type: Declarative
  description: "Fallback orchestrator. Same role as atlas, different model."
  declarative:
    runtime: go
    modelConfig: moonshotai-kimi-k2-6
    systemMessageFrom:
      name: kagent-prompts
      key: atlas-fb-system.txt
      type: ConfigMap
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

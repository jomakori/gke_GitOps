apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: writing-agent-fb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  type: Declarative
  description: "Fallback writing agent when primary model fails"
  declarative:
    runtime: go
    modelConfig: moonshotai-kimi-k2-6
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: writing-agent-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

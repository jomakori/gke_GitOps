apiVersion: kagent.dev/v1alpha2
kind: SandboxAgent
metadata:
  name: sisyphus-junior
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
    agent-type: primary
    agent-role: worker
spec:
  type: Declarative
  description: "Focused sub-worker. Executes delegated implementation subtasks without re-delegating."
  declarative:
    runtime: go
    modelConfig: moonshotai-kimi-k2-6
    systemMessageFrom:
      configMapKeyRef:
        name: kagent-prompts
        key: sisyphus-junior-system.txt
  platform: substrate
  substrate:
    workerPoolRef:
      name: kagent-default

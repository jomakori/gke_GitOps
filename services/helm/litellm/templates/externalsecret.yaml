{{- if .Values.dopplerConfig }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "litellm.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 1m
  target:
    name: litellm-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: ".*"
{{- end }}

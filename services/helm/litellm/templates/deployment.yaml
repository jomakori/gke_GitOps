apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litellm.fullname" . }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "litellm.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "litellm.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "litellm.fullname" . }}

      containers:
        - name: litellm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/litellm/litellm_config.yaml
            - --port
            - "{{ .Values.service.port }}"
            - --num_workers
            - "1"

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-pg
                  key: database-url
          envFrom:
            - secretRef:
                name: litellm-secrets

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          ports:
            - name: proxy
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: proxy
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/readiness
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: {{ include "litellm.fullname" . }}-config
        - name: tmp
          emptyDir: {}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramalama
  labels:
    app.kubernetes.io/name: ramalama
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ramalama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ramalama
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ramalama
              topologyKey: kubernetes.io/hostname
      initContainers:
      - name: download-model
        image: alpine:latest
        command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache wget
          mkdir -p /models/slots
          MODEL="/models/{{ .Values.model.alias }}.gguf"
          MIN_SIZE=$((8 * 1024 * 1024 * 1024))
          SIZE() { stat -c %s "$MODEL" 2>/dev/null || echo 0; }
          if [ -f "$MODEL" ] && [ "$(SIZE)" -lt "$MIN_SIZE" ]; then
            echo "Model is incomplete ($(($(SIZE) / 1048576)) MB), re-downloading..."
            rm -f "$MODEL"
          fi
          if [ ! -f "$MODEL" ]; then
            echo "Downloading {{ .Values.model.alias }} (~18GB)..."
            wget --progress=bar:force --limit-rate=100M --tries=3 --waitretry=5 -O "$MODEL" {{ .Values.model.url }}
            echo "Download complete."
          else
            echo "Model exists, skipping download."
          fi
        volumeMounts:
        - name: models
          mountPath: /models
      containers:
      - name: llama-server
        image: {{ .Values.image }}:{{ .Values.tag }}
        command:
        - llama-server
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory }}
            squat.ai/dri: {{ .Values.gpuResourceLimit }}
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory }}
            squat.ai/dri: {{ .Values.gpuResourceLimit }}
        volumeMounts:
        - name: models
          mountPath: /models
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ramalama-models
          readOnly: false

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramalama
  labels:
    app.kubernetes.io/name: ramalama
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ramalama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ramalama
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ramalama
              topologyKey: kubernetes.io/hostname
      initContainers:
      - name: download-model
        image: curlimages/curl:latest
        command:
        - sh
        - -c
        - |
          set -e
          mkdir -p /models/slots
          MODEL="/models/{{ .Values.model.alias }}.gguf"
          # Minimum expected size (~17GB) — delete truncated files from interrupted downloads
          MIN_SIZE=$((17 * 1024 * 1024 * 1024))
          if [ -f "$MODEL" ] && [ "$(wc -c < "$MODEL" 2>/dev/null || echo 0)" -lt "$MIN_SIZE" ]; then
            echo "Model is incomplete ($(($(wc -c < "$MODEL" 2>/dev/null || echo 0) / 1048576)) MB), re-downloading..."
            rm -f "$MODEL"
          fi
          if [ ! -f "$MODEL" ]; then
            echo "Downloading {{ .Values.model.alias }} (~18GB)..."
            curl -L --retry 3 --retry-delay 5 -o "$MODEL" {{ .Values.model.url }} &
            CURL_PID=$!
            while kill -0 $CURL_PID 2>/dev/null; do
              if [ -f "$MODEL" ]; then
                echo "$(($(wc -c < "$MODEL" 2>/dev/null || echo 0) / 1048576)) MB downloaded"
              fi
              sleep 30
            done
            wait $CURL_PID
            echo "Download complete."
          else
            echo "Model exists, skipping download."
          fi
        volumeMounts:
        - name: models
          mountPath: /models
      containers:
      - name: llama-server
        image: {{ .Values.image }}:{{ .Values.tag }}
        command:
        - llama-server
        - --host
        - "0.0.0.0"
        - --port
        - "{{ .Values.service.port }}"
        - --model
        - /models/{{ .Values.model.alias }}.gguf
        - --alias
        - {{ .Values.model.alias }}
        - -ngl
        - "999"
        {{- if .Values.inference.flashAttn }}
        - --flash-attn
        - "on"
        {{- end }}
        {{- if .Values.inference.cacheTypeK }}
        - --cache-type-k
        - {{ .Values.inference.cacheTypeK }}
        {{- end }}
        {{- if .Values.inference.cacheTypeV }}
        - --cache-type-v
        - {{ .Values.inference.cacheTypeV }}
        {{- end }}
        - --ctx-size
        - "{{ .Values.inference.ctxSize }}"
        - --batch-size
        - "{{ .Values.inference.batchSize }}"
        - --ubatch-size
        - "{{ .Values.inference.ubatchSize }}"
        {{- if ne (.Values.inference.threads | int) 0 }}
        - -t
        - "{{ .Values.inference.threads }}"
        {{- end }}
        {{- if .Values.inference.mlock }}
        - --mlock
        {{- end }}
        {{- if .Values.inference.slotSavePath }}
        - --slot-save-path
        - {{ .Values.inference.slotSavePath }}
        {{- end }}
        {{- if .Values.inference.noWarmup }}
        - --no-warmup
        {{- end }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory }}
            squat.ai/dri: {{ .Values.gpuResourceLimit }}
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory }}
            squat.ai/dri: {{ .Values.gpuResourceLimit }}
        volumeMounts:
        - name: models
          mountPath: /models
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ramalama-models
          readOnly: false

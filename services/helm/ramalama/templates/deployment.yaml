apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramalama
  labels:
    app.kubernetes.io/name: ramalama
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ramalama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ramalama
    spec:
      initContainers:
      - name: download-model
        image: curlimages/curl:latest
        command:
        - sh
        - -c
        - |
          mkdir -p /models/slots
          if [ ! -f /models/{{ .Values.model.alias }}.gguf ]; then
            echo "Downloading model..."
            curl -L --retry 3 --retry-delay 5 -o /models/{{ .Values.model.alias }}.gguf {{ .Values.model.url }}
          else
            echo "Model already exists, skipping download."
          fi
        volumeMounts:
        - name: models
          mountPath: /models
      containers:
      - name: llama-server
        image: {{ .Values.image }}:{{ .Values.tag }}
        command:
        - llama-server
        - --host
        - "0.0.0.0"
        - --port
        - "{{ .Values.service.port }}"
        - --model
        - /models/{{ .Values.model.alias }}.gguf
        - --alias
        - {{ .Values.model.alias }}
        - -ngl
        - "999"
        {{- if .Values.inference.flashAttn }}
        - --flash-attn
        - "on"
        {{- end }}
        {{- if .Values.inference.cacheTypeK }}
        - --cache-type-k
        - {{ .Values.inference.cacheTypeK }}
        {{- end }}
        {{- if .Values.inference.cacheTypeV }}
        - --cache-type-v
        - {{ .Values.inference.cacheTypeV }}
        {{- end }}
        - --ctx-size
        - "{{ .Values.inference.ctxSize }}"
        - --batch-size
        - "{{ .Values.inference.batchSize }}"
        - --ubatch-size
        - "{{ .Values.inference.ubatchSize }}"
        {{- if ne (.Values.inference.threads | int) 0 }}
        - -t
        - "{{ .Values.inference.threads }}"
        {{- end }}
        {{- if .Values.inference.mlock }}
        - --mlock
        {{- end }}
        {{- if .Values.inference.slotSavePath }}
        - --slot-save-path
        - {{ .Values.inference.slotSavePath }}
        {{- end }}
        {{- if .Values.inference.noWarmup }}
        - --no-warmup
        {{- end }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
          protocol: TCP
        resources:
          limits:
            squat.ai/dri: {{ .Values.gpuResourceLimit }}
        volumeMounts:
        - name: models
          mountPath: /models
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ramalama-models
          readOnly: false

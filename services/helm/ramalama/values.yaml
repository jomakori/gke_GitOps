image: quay.io/ramalama/ramalama
tag: latest

replicas: 1

# Model to download at startup (from Hugging Face).
# IQ2_XXS ~9GB — fits in 14.6Gi node RAM
model:
  url: https://huggingface.co/bartowski/Qwen_Qwen3.6-27B-GGUF/resolve/main/Qwen_Qwen3.6-27B-IQ2_XXS.gguf
  alias: qwen3.6-27b

# GPU resource from generic-device-plugin
gpuResourceLimit: 1

# Requests for scheduler binpacking, limits cap OOM risk on 14.6Gi nodes
resources:
  requests:
    cpu: "8"
    memory: 14Gi
  limits:
    cpu: "8"
    memory: 14Gi

persistence:
  enabled: true
  size: 25Gi
  storageClass: ""
  accessMode: ReadWriteOnce

inference:
  # Flash attention — disabled to save memory
  flashAttn: false
  # KV cache quantization — disabled to save memory
  cacheTypeK: ""
  cacheTypeV: ""
  # Context window — 4K to fit in 14Gi node
  ctxSize: 4096
  # Batch size — minimal for memory
  batchSize: 256
  ubatchSize: 128
  # CPU threads — 0 = auto-detect optimal count
  threads: 0
  # Lock model in RAM — disabled: OOMs 12Gi limit on 14.6Gi nodes
  mlock: false
  # Persist KV cache to PVC — avoids reprocessing prompts after restarts
  slotSavePath: /models/slots
  # Skip warmup on startup — faster cold start, slightly slower first request
  noWarmup: true

service:
  port: 8080

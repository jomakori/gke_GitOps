dopplerConfig: "svc_onedev"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │   PostgreSQL Cluster (StackGres SGCluster)                                  │
# └─────────────────────────────────────────────────────────────────────────────┘
postgresql:
  # -- PostgreSQL cluster name (also used as the K8s service name)
  clusterName: "onedev-pg"
  # -- Number of Postgres instances (1 = single primary, no replicas)
  instances: 1
  # -- Storage size for Postgres data
  storage: 5Gi
  # -- SGInstanceProfile name (empty = use StackGres default: 1 core, 2Gi RAM)
  sgInstanceProfile: ""
  # -- Profile for the SGCluster (development = no anti-affinity, no resource limits)
  profile: "development"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │   OneDev Configuration (upstream chart values)                              │
# └─────────────────────────────────────────────────────────────────────────────┘
onedev:
  replicas: 1
  updateStrategy:
    type: RollingUpdate

  # Persistent storage for OneDev data (repos, artifacts, etc.)
  persistence:
    size: 50Gi
    storageClassName: ""

  # External PostgreSQL database configuration
  database:
    external: true
    type: postgresql
    host: "onedev-pg.onedev.svc.cluster.local"
    port: "5432"
    name: "postgres"
    user: "onedev"
    password: "placeholder"
    maximumPoolSize: "25"

  # Resource requests/limits for OneDev
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

  # Node scheduling for app nodes
  nodeSelector:
    intent: apps

  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "apps"
      effect: "NoSchedule"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: class
                operator: In
                values:
                  - guaranteed

dopplerConfig: "svc_onedev"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │   PostgreSQL Cluster (StackGres SGCluster)                                  │
# └─────────────────────────────────────────────────────────────────────────────┘
postgresql:
  # -- PostgreSQL cluster name (also used as the K8s service name)
  clusterName: "onedev-pg"
  # -- Number of Postgres instances (1 = single primary, no replicas)
  instances: 1
  # -- Storage size for Postgres data
  storage: 5Gi
  # -- SGInstanceProfile name (empty = use StackGres default: 1 core, 2Gi RAM)
  sgInstanceProfile: ""
  # -- Profile for the SGCluster (development = no anti-affinity, no resource limits)
  profile: "development"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │   OneDev Configuration (upstream chart values)                              │
# └─────────────────────────────────────────────────────────────────────────────┘
onedev:
  replicas: 1
  updateStrategy:
    type: RollingUpdate

  # Persistent storage for OneDev data (repos, artifacts, etc.)
  persistence:
    size: 50Gi
    storageClassName: ""

  # External PostgreSQL database configuration
  # Credentials are stored in Doppler config svc_onedev (DB_USER, DB_PASSWORD)
  # The password is auto-generated by StackGres and injected via env override.
  # Bootstrap flow:
  #   1. Deploy everything → StackGres creates PG with auto-generated password
  #   2. Extract: kubectl get secret onedev-pg -n onedev -o jsonpath='{.data.superuser-password}' | base64 -d
  #   3. Store in Doppler: doppler secrets set DB_PASSWORD=<real-pw> --project devops --config svc_onedev
  #   4. ExternalSecret syncs → OneDev picks up real password
  database:
    external: true
    type: postgresql
    host: "onedev-pg.onedev.svc.cluster.local"
    port: "5432"
    name: "postgres"
    user: ""
    password: ""
    maximumPoolSize: "25"

  # Env overrides — appended after hardcoded env vars in the chart template.
  # Later entries override earlier ones for duplicate env var names.
  env:
    - name: hibernate_connection_username
      valueFrom:
        secretKeyRef:
          name: onedev-db-creds
          key: DB_USER
    - name: hibernate_connection_password
      valueFrom:
        secretKeyRef:
          name: onedev-db-creds
          key: DB_PASSWORD

  # Resource requests/limits for OneDev
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

  # Node scheduling for app nodes
  nodeSelector:
    intent: apps

  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "apps"
      effect: "NoSchedule"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: class
                operator: In
                values:
                  - guaranteed

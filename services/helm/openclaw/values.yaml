# Overrides for the upstream openclaw-helm chart
# See https://github.com/serhanekicii/openclaw-helm for full options

openclaw:
  app-template:
    # Use v2026.6.8 — required for WhatsApp plugin API compatibility
    openclawVersion: "2026.6.8"
    # Overwrite config on every sync (strict GitOps)
    configMode: overwrite
    # Skip ClawHub skills — we use oh-my-openclaw plugin instead
    skills: []

    controllers:
      main:
        initContainers:
          # Existing init containers (init-config, init-skills) are defined upstream
          # and keep their default behavior.
          init-plugins:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "{{ .Values.openclawVersion }}"
            command:
              - sh
              - -c
              - |
                echo "[init-plugins] Installing oh-my-openclaw..."
                node /app/dist/index.js plugins install npm:@happycastle/oh-my-openclaw@latest 2>/dev/null || true
                echo "[init-plugins] Installing WhatsApp plugin..."
                node /app/dist/index.js plugins install clawhub:@openclaw/whatsapp 2>/dev/null || true
                node /app/dist/index.js plugins enable oh-my-openclaw 2>/dev/null || true
                echo "[init-plugins] Resolving env vars in config..."
                sed -i "s|\${WHATSAPP_ALLOW_FROM}|${WHATSAPP_ALLOW_FROM}|g" /home/node/.openclaw/openclaw.json
                echo "[init-plugins] Running doctor --fix..."
                node /app/dist/index.js doctor --fix 2>/dev/null || true
                echo "[init-plugins] Done"
            env:
              HOME: /home/node
              NPM_CONFIG_CACHE: /tmp/.npm
            envFrom:
              - secretRef:
                  name: openclaw-secrets
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

        containers:
          main:
            # Inject LLM keys + gateway token from Doppler-backed secret
            envFrom:
              - secretRef:
                  name: openclaw-secrets

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 3Gi

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "mode": "local",
                "trustedProxies": ["10.244.0.0/16"],
                "auth": {
                  "mode": "trusted-proxy",
                  "trustedProxy": {
                    "userHeader": "Cf-Access-Authenticated-User-Email"
                  }
                },
                "controlUi": {
                  "allowedOrigins": ["https://openclaw.maklab.net"]
                }
              },

              "browser": {
                "enabled": true,
                "defaultProfile": "default",
                "profiles": {
                  "default": {
                    "cdpUrl": "http://localhost:9222",
                    "color": "#4285F4"
                  }
                }
              },

              "agents": {
                "defaults": {
                  "workspace": "/home/node/.openclaw/workspace",
                  "model": {
                    "primary": "anthropic/claude-sonnet-4-6",
                    "fallbacks": ["openai/gpt-4.1", "google/gemini-3.1-pro"]
                  },
                  "userTimezone": "America/Chicago",
                  "timeoutSeconds": 600,
                  "maxConcurrent": 1
                },
                "list": [
                  {
                    "id": "main",
                    "default": true,
                    "identity": {
                      "name": "OpenClaw",
                      "emoji": "🦞"
                    },
                    "model": {
                      "primary": "anthropic/claude-sonnet-4-6"
                    },
                    "tools": { "profile": "full" }
                  }
                ]
              },

              // oh-my-openclaw plugin sub-agent configs
              "plugins": {
                "bundledDiscovery": "allowlist",
                "entries": {
                  "oh-my-openclaw": {
                    "enabled": true,
                    "config": {
                      "max_ralph_iterations": 10,
                      "todo_enforcer_enabled": false,
                      "comment_checker_enabled": true,
                      "model_routing": {
                        "quick": { "model": "anthropic/claude-sonnet-4-6" },
                        "deep": { "model": "anthropic/claude-opus-4-6" },
                        "ultrabrain": { "model": "openai/gpt-5.3-codex" },
                        "visual-engineering": { "model": "google/gemini-3.1-pro" }
                      }
                    }
                  }
                }
              },

              "session": {
                "scope": "per-sender",
                "store": "/home/node/.openclaw/sessions",
                "reset": {
                  "mode": "idle",
                  "idleMinutes": 60
                }
              },

              "logging": {
                "level": "info",
                "consoleLevel": "info",
                "consoleStyle": "compact",
                "redactSensitive": "tools"
              },

              "tools": {
                "profile": "full",
                "web": {
                  "search": { "enabled": false },
                  "fetch": { "enabled": true }
                }
              },

              // WhatsApp channel — personal number mode
              "channels": {
                "whatsapp": {
                  "enabled": true,
                  "dmPolicy": "allowlist",
                  "selfChatMode": true,
                  "allowFrom": ["${WHATSAPP_ALLOW_FROM}"],
                  "sendReadReceipts": true,
                  "textChunkLimit": 4000,
                  "chunkMode": "length",
                  "replyToMode": "off",
                  "reactionLevel": "minimal"
                }
              }
            }

    persistence:
      data:
        size: 10Gi
        advancedMounts:
          main:
            init-plugins:
              - path: /home/node/.openclaw
      tmp:
        advancedMounts:
          main:
            init-plugins:
              - path: /tmp

    ingress:
      main:
        enabled: false

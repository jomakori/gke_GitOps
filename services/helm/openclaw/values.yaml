# ┌──────────────────────────────────────────────────────────────────┐
# │ OpenClaw - AI assistant gateway powered by OpenCrust             │
# │                                                                  │
# │ Image: opencrust:v0.2.9 (built locally)                          │
# │ Config: https://github.com/opencrust-org/opencrust               │
# └──────────────────────────────────────────────────────────────────┘

# -- Doppler project; set by ArgoCD appset. Creates ExternalSecret when present.
#    Expected env vars: ANTHROPIC_API_KEY, WHATSAPP_ACCESS_TOKEN, etc.
dopplerConfig: ""

# -- Container image
image:
  repository: localhost:5000/opencrust
  tag: v0.2.9
  pullPolicy: IfNotPresent

# -- Init container image for config rendering (needs sh + sed)
initImage:
  repository: busybox
  tag: "1.36.1"
  pullPolicy: IfNotPresent

# -- Service settings
service:
  port: 3888

# -- Resource requests/limits
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- HPA scaling (optional)
enable_scaling: false
hpa:
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# -- Storage (ReadWriteMany for multi-replica scaling)
storage:
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# ┌──────────────────────────────────────────────────────────────────┐
# │ OpenCrust config.yml                                            │
# │ See https://github.com/opencrust-org/opencrust for full schema  │
# └──────────────────────────────────────────────────────────────────┘
config:
  # OpenCrust gateway only supports host/port/api_key/rate_limit.
  # Cloudflare Access auth happens at the Istio ingress layer.
  gateway:
    host: "0.0.0.0"
    port: 3888

  llm:
    anthropic:
      provider: anthropic
      model: claude-sonnet-4-5-20250929
    claude-opus:
      provider: anthropic
      model: claude-opus-4-6
    claude-haiku:
      provider: anthropic
      model: claude-haiku-4-5-20251001
    deepseek:
      provider: deepseek
      model: deepseek-chat
    moonshot:
      provider: moonshot
      model: moonshot-v1-auto
      base_url: https://api.moonshot.ai/v1
    moonshot-kimi:
      provider: moonshot
      model: kimi-k2.6
      base_url: https://api.moonshot.ai/v1
    opencode:
      provider: openai
      model: opencode-zen
      base_url: https://opencode.ai/zen/v1
    opencode-big-pickle:
      provider: openai
      model: big-pickle
      base_url: https://opencode.ai/zen/v1
    opencode-deepseek-flash:
      provider: openai
      model: deepseek-v4-flash-free
      base_url: https://opencode.ai/zen/v1
    opencode-north-mini:
      provider: openai
      model: north-mini-code-free
      base_url: https://opencode.ai/zen/v1
    opencode-mimo:
      provider: openai
      model: mimo-v2.5-free
      base_url: https://opencode.ai/zen/v1

  agent:
    default_provider: opencode-big-pickle
    max_tokens: 4096
    max_context_tokens: 100000
    system_prompt: |
      You are OpenClaw, a personal AI assistant running on Kubernetes.
      You use oh-my-openagent for multi-agent orchestration and task delegation.

      When the user gives a request:
      1. ANALYZE — understand what's needed
      2. PLAN — break it down into subtasks
      3. DELEGATE — use the `handoff` tool to dispatch work to specialized sub-agents
      4. REVIEW — check results from sub-agents
      5. SYNTHESIZE — combine results into a coherent answer

      Available sub-agents:
      - sisyphus — orchestrator for complex multi-step tasks
      - hephaestus — builder for implementation work
      - oracle — architecture and design consultant (read-only)
      - librarian — codebase search and documentation lookup
      - explore — contextual grep and pattern discovery
      - prometheus — task planning and work breakdown
      - metis — pre-planning ambiguity analysis
      - momus — plan review and gap detection
      - atlas — heavy-lifting implementation and refactoring
      - sisyphus-junior — focused single-task executor
      - ultraworker — deep research on hard problems
      - coder — code generation and implementation
      - researcher — deep research and analysis

      When a task is simple, handle it directly. For complex or multi-step
      work, always delegate via handoff.

  agents:
    sisyphus:
      provider: opencode-big-pickle
      system_prompt: |
        You are Sisyphus, orchestrator agent. Decompose complex tasks
        into parallel subtasks and oversee execution.
        Use handoff to delegate to sub-agents when needed.
    hephaestus:
      provider: opencode-north-mini
      system_prompt: |
        You are Hephaestus, a builder agent. Implement features,
        fix bugs, and write tests. Follow existing patterns.
    oracle:
      provider: opencode-big-pickle
      system_prompt: |
        You are Oracle, a read-only architecture consultant.
        Analyze designs, identify problems, and propose solutions.
        Do not implement. Do not write code.
    librarian:
      provider: opencode-deepseek-flash
      system_prompt: |
        You are Librarian. Search codebases, read docs, find
        implementation examples. Return concise answers.
    explore:
      provider: opencode-deepseek-flash
      system_prompt: |
        You are Explore. Contextual grep for codebases.
        Find patterns, locate files, map module structure.
    multimodal-looker:
      provider: opencode-mimo
      system_prompt: |
        You are Multimodal Looker. Analyze images, PDFs,
        and diagrams. Extract specific information.
    prometheus:
      provider: moonshot-kimi
      system_prompt: |
        You are Prometheus, plan agent. Break down tasks into
        structured work plans with parallel execution opportunities.
    metis:
      provider: opencode-big-pickle
      system_prompt: |
        You are Metis, pre-planning consultant. Identify hidden
        intentions, ambiguities, and AI failure points.
    momus:
      provider: moonshot-kimi
      system_prompt: |
        You are Momus, plan critic. Evaluate plans for clarity,
        verifiability, and completeness. Catch gaps.
    atlas:
      provider: opencode-big-pickle
      system_prompt: |
        You are Atlas. Heavy-lifting implementation and
        cross-file refactoring. Follow existing patterns.
    sisyphus-junior:
      provider: moonshot-kimi
      system_prompt: |
        You are Sisyphus-Junior, focused task executor.
        Same discipline as Sisyphus, no delegation.
    ultraworker:
      provider: opencode-big-pickle
      system_prompt: |
        You are Ultraworker. Autonomous problem-solving on
        hairy problems requiring deep research.
    opencrust:
      provider: opencode-big-pickle
      system_prompt: |
        You are OpenCrust, the sidecar orchestrator.
        Route requests to the right agent and synthesize results.
    coder:
      provider: deepseek
      system_prompt: |
        You are a coder agent. Write clean, correct code.
        Follow existing patterns, don't suppress type errors,
        and verify your work.
    researcher:
      provider: opencode
      system_prompt: |
        You are a research agent. Find information, read docs,
        and summarize findings. Be thorough and cite sources.

  channels:
    whatsapp:
      type: whatsapp
      enabled: true
      dm_policy: allowlist
      allow_from:
        - ${WHATSAPP_ALLOW_FROM}
      self_chat_mode: true
      send_read_receipts: true
      text_chunk_limit: 4000
      chunk_mode: length
      reply_to_mode: "off"
      reaction_level: minimal

  memory:
    enabled: true

  data_dir: /data
  log_level: info

# ┌──────────────────────────────────────────────────────────────────┐
# │ EdgeCrab - AI orchestrator (Rust-native)                         │
# │                                                                  │
# │ Image: ghcr.io/raphaelmansuy/edgecrab:latest                     │
# │ Config: https://github.com/raphaelmansuy/edgecrab                │
# │                                                                  │
# │ Combines the best of OpenClaw and Hermes agent in a              │
# │ resource-light Rust binary (~49MB) with 17 messaging gateways,   │
# │ 16 LLM providers, and built-in memory/learning.                 │
# └──────────────────────────────────────────────────────────────────┘

# -- Doppler config; set by ArgoCD appset. Creates ExternalSecret when present.
#    Expected keys: ANTHROPIC_API_KEY, DEEPSEEK_API_KEY, MOONSHOT_API_KEY,
#    OPENCODE_API_KEY, ZAI_API_KEY, WHATSAPP_ALLOW_FROM
dopplerConfig: ""

# -- Container image (official EdgeCrab from GHCR)
image:
  repository: ghcr.io/raphaelmansuy/edgecrab
  tag: "0.10.0"
  pullPolicy: IfNotPresent

# -- Service settings (gateway port)
service:
  port: 8642

# -- Resource requests/limits
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- VPA (Vertical Pod Autoscaler) for single-pod scaling
vpa:
  enabled: true
  minAllowed:
    cpu: 100m
    memory: 256Mi
  maxAllowed:
    cpu: 4000m
    memory: 4Gi
  controlledResources: ["cpu", "memory"]
  updatePolicy:
    updateMode: "Auto"

# -- Storage for EdgeCrab state (memories, skills, sessions)
storage:
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# ┌──────────────────────────────────────────────────────────────────┐
# │ EdgeCrab config.yaml                                             │
# │ See https://github.com/raphaelmansuy/edgecrab for full schema    │
# └──────────────────────────────────────────────────────────────────┘
config:
  # -- Default model: z.ai glm-5.2 as ultrabrain
  model:
    default: "zai/glm-5.2"
    fallback:
      model: "claude-opus-4-6"
      provider: "anthropic"
      api_key_env: "ANTHROPIC_API_KEY"
    max_iterations: 90
    streaming: true
    prompt_caching: true

  # -- Logging configuration
  logging:
    level: "info"

  # -- Agent system prompt
  agent:
    system_prompt: |
      You are OpenClaw, a personal AI assistant running on Kubernetes.
      You use oh-my-openagent for multi-agent orchestration and task delegation.

      When the user gives a request:
      1. ANALYZE — understand what's needed
      2. PLAN — break it down into subtasks
      3. DELEGATE — use the `handoff` tool to dispatch work to specialized sub-agents
      4. REVIEW — check results from sub-agents
      5. SYNTHESIZE — combine results into a coherent answer

      Available sub-agents:
      - sisyphus — orchestrator for complex multi-step tasks
      - hephaestus — builder for implementation work
      - oracle — architecture and design consultant (read-only)
      - librarian — codebase search and documentation lookup
      - explore — contextual grep and pattern discovery
      - prometheus — task planning and work breakdown
      - metis — pre-planning ambiguity analysis
      - momus — plan review and gap detection
      - atlas — heavy-lifting implementation and refactoring
      - sisyphus-junior — focused single-task executor
      - ultraworker — deep research on hard problems
      - coder — code generation and implementation
      - researcher — deep research and analysis

      When a task is simple, handle it directly. For complex or multi-step
      work, always delegate via handoff.

  # -- Gateway configuration for messaging platforms
  gateway:
    host: "0.0.0.0"
    port: 8642
    # -- WhatsApp gateway (Baileys bridge)
    whatsapp:
      enabled: true
      mode: "bridge"
      allowed_users:
        - "${WHATSAPP_ALLOW_FROM}"
      self_chat_mode: true
      send_read_receipts: true
      reply_prefix: null
    # -- API server for HTTP access
    api_server:
      enabled: true
      port: 8642
    # -- Home Assistant integration (optional)
    homeassistant:
      enabled: false

  # -- Memory configuration
  memory:
    enabled: true
    write_approval: false

  # -- Skills configuration
  skills:
    write_approval: false
    inline_shell: false

  # -- LSP configuration
  lsp:
    enabled: true

  # -- Tool configuration
  tools:
    parallel_execution: true
    max_parallel_workers: 8

  # -- Delegation configuration for sub-agents
  delegation:
    enabled: true
    max_subagents: 3
    max_iterations: 50

  # -- Compression configuration
  compression:
    threshold: 0.5
    protect_last_n: 20

  # -- Display configuration
  display:
    activity_shelf: true

  # -- Checkpoints for rollback
  checkpoints:
    enabled: true
    max_snapshots: 50

# ┌──────────────────────────────────────────────────────────────────┐
# │ Provider configurations                                           │
# │ Custom providers are configured via model catalog overrides      │
# └──────────────────────────────────────────────────────────────────┘

providers:
  # -- z.ai provider (OpenAI-compatible) - used as ultrabrain
  zai:
    base_url: "https://api.z.ai/api/paas/v4"
    api_key_env: "ZAI_API_KEY"
    models:
      glm-5.2:
        context_window: 128000
        max_output_tokens: 8192

  # -- Anthropic provider
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    models:
      claude-sonnet-4-5-20250929:
        context_window: 200000
      claude-opus-4-6:
        context_window: 200000
      claude-haiku-4-5-20251001:
        context_window: 200000

  # -- DeepSeek provider
  deepseek:
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      deepseek-chat:
        context_window: 64000

  # -- Moonshot/Kimi provider
  moonshot:
    base_url: "https://api.moonshot.ai/v1"
    api_key_env: "MOONSHOT_API_KEY"
    models:
      kimi-k2.6:
        context_window: 128000
      moonshot-v1-auto:
        context_window: 128000

  # -- OpenCode Zen provider
  opencode:
    base_url: "https://opencode.ai/zen/v1"
    api_key_env: "OPENCODE_API_KEY"
    models:
      opencode-zen:
        context_window: 128000
      big-pickle:
        context_window: 128000
      deepseek-v4-flash-free:
        context_window: 128000
      north-mini-code-free:
        context_window: 128000
      mimo-v2.5-free:
        context_window: 128000

# ┌──────────────────────────────────────────────────────────────────┐
# │ Agent-specific provider mappings                                 │
# │ Each agent can use a different provider/model combination        │
# └──────────────────────────────────────────────────────────────────┘
agents:
  sisyphus:
    provider: "zai/glm-5.2"
    system_prompt: |
      You are Sisyphus, orchestrator agent. Decompose complex tasks
      into parallel subtasks and oversee execution.
      Use handoff to delegate to sub-agents when needed.

  hephaestus:
    provider: "opencode/north-mini-code-free"
    system_prompt: |
      You are Hephaestus, a builder agent. Implement features,
      fix bugs, and write tests. Follow existing patterns.

  oracle:
    provider: "zai/glm-5.2"
    system_prompt: |
      You are Oracle, a read-only architecture consultant.
      Analyze designs, identify problems, and propose solutions.
      Do not implement. Do not write code.

  librarian:
    provider: "opencode/deepseek-v4-flash-free"
    system_prompt: |
      You are Librarian. Search codebases, read docs, find
      implementation examples. Return concise answers.

  explore:
    provider: "opencode/deepseek-v4-flash-free"
    system_prompt: |
      You are Explore. Contextual grep for codebases.
      Find patterns, locate files, map module structure.

  multimodal-looker:
    provider: "opencode/mimo-v2.5-free"
    system_prompt: |
      You are Multimodal Looker. Analyze images, PDFs,
      and diagrams. Extract specific information.

  prometheus:
    provider: "moonshot/kimi-k2.6"
    system_prompt: |
      You are Prometheus, plan agent. Break down tasks into
      structured work plans with parallel execution opportunities.

  metis:
    provider: "zai/glm-5.2"
    system_prompt: |
      You are Metis, pre-planning consultant. Identify hidden
      intentions, ambiguities, and AI failure points.

  momus:
    provider: "moonshot/kimi-k2.6"
    system_prompt: |
      You are Momus, plan critic. Evaluate plans for clarity,
      verifiability, and completeness. Catch gaps.

  atlas:
    provider: "zai/glm-5.2"
    system_prompt: |
      You are Atlas. Heavy-lifting implementation and
      cross-file refactoring. Follow existing patterns.

  sisyphus-junior:
    provider: "moonshot/kimi-k2.6"
    system_prompt: |
      You are Sisyphus-Junior, focused task executor.
      Same discipline as Sisyphus, no delegation.

  ultraworker:
    provider: "zai/glm-5.2"
    system_prompt: |
      You are Ultraworker. Autonomous problem-solving on
      hairy problems requiring deep research.

  opencrust:
    provider: "zai/glm-5.2"
    system_prompt: |
      You are OpenCrust, the sidecar orchestrator.
      Route requests to the right agent and synthesize results.

  coder:
    provider: "deepseek/deepseek-chat"
    system_prompt: |
      You are a coder agent. Write clean, correct code.
      Follow existing patterns, don't suppress type errors,
      and verify your work.

  researcher:
    provider: "opencode/opencode-zen"
    system_prompt: |
      You are a research agent. Find information, read docs,
      and summarize findings. Be thorough and cite sources.

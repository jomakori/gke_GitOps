apiVersion: v1
kind: ConfigMap
metadata:
  name: edgecrab-whatsapp-bridge
  labels:
    app.kubernetes.io/name: edgecrab
data:
  bridge.js: |
    const { makeWASocket, useMultiFileAuthState, DisconnectReason } = require('@whiskeysockets/baileys');
    const pino = require('pino');
    const http = require('http');
    const fs = require('fs');
    const path = require('path');

    const PORT = process.env.BRIDGE_PORT || 3000;
    const SESSION_PATH = process.env.SESSION_PATH || '/session';
    const MODE = process.env.WHATSAPP_MODE || 'self-chat';
    const ALLOWED_USERS = (process.env.WHATSAPP_ALLOWED_USERS || '').split(',').filter(Boolean);

    let sock = null;
    let messages = [];
    let connectionStatus = 'disconnected';

    const logger = pino({ level: 'silent' });

    async function startSocket() {
      const { state, saveCreds } = await useMultiFileAuthState(SESSION_PATH);
      
      sock = makeWASocket({
        auth: state,
        printQRInTerminal: true,
        logger,
        browser: ['EdgeCrab', 'Chrome', '1.0.0'],
      });

      sock.ev.on('connection.update', async (update) => {
        const { connection, lastDisconnect, qr } = update;
        
        if (qr) {
          console.log('QR code received - scan with WhatsApp');
          connectionStatus = 'qr';
        }
        
        if (connection === 'close') {
          connectionStatus = 'disconnected';
          const shouldReconnect = lastDisconnect?.error?.output?.statusCode !== DisconnectReason.loggedOut;
          console.log('Connection closed, reconnecting:', shouldReconnect);
          if (shouldReconnect) {
            setTimeout(startSocket, 5000);
          }
        } else if (connection === 'open') {
          connectionStatus = 'connected';
          console.log('WhatsApp connected');
        }
      });

      sock.ev.on('creds.update', saveCreds);

      sock.ev.on('messages.upsert', async ({ messages: newMessages }) => {
        for (const msg of newMessages) {
          if (msg.key.fromMe) continue;
          
          const senderId = msg.key.remoteJid;
          const senderNum = senderId.split('@')[0];
          
          if (MODE === 'self-chat') continue;
          if (ALLOWED_USERS.length > 0 && !ALLOWED_USERS.includes(senderNum)) continue;

          const message = {
            messageId: msg.key.id,
            chatId: senderId,
            senderId: senderNum,
            senderName: msg.pushName || null,
            fromMe: msg.key.fromMe,
            body: msg.message?.conversation || msg.message?.extendedTextMessage?.text || '',
            mediaUrls: [],
          };
          
          messages.push(message);
          if (messages.length > 100) messages.shift();
        }
      });
    }

    const server = http.createServer(async (req, res) => {
      res.setHeader('Content-Type', 'application/json');
      
      if (req.url === '/health') {
        res.end(JSON.stringify({ status: connectionStatus }));
        return;
      }

      if (req.method === 'GET' && req.url === '/messages') {
        const batch = messages.splice(0);
        res.end(JSON.stringify(batch));
        return;
      }

      if (req.method === 'POST' && req.url === '/send') {
        let body = '';
        req.on('data', chunk => body += chunk);
        req.on('end', async () => {
          try {
            const { chatId, message } = JSON.parse(body);
            await sock.sendMessage(chatId, { text: message });
            res.end(JSON.stringify({ success: true }));
          } catch (error) {
            res.end(JSON.stringify({ success: false, error: error.message }));
          }
        });
        return;
      }

      if (req.method === 'POST' && req.url === '/send-media') {
        let body = '';
        req.on('data', chunk => body += chunk);
        req.on('end', async () => {
          try {
            const { chatId, filePath, mediaType, caption } = JSON.parse(body);
            const buffer = fs.readFileSync(filePath);
            const msg = {};
            if (mediaType === 'image') msg.image = buffer;
            else if (mediaType === 'video') msg.video = buffer;
            else if (mediaType === 'audio') msg.audio = buffer;
            else msg.document = buffer;
            if (caption) msg.caption = caption;
            await sock.sendMessage(chatId, msg);
            res.end(JSON.stringify({ success: true }));
          } catch (error) {
            res.end(JSON.stringify({ success: false, error: error.message }));
          }
        });
        return;
      }

      if (req.method === 'POST' && req.url === '/send-clarify') {
        let body = '';
        req.on('data', chunk => body += chunk);
        req.on('end', async () => {
          try {
            const { chatId, question, interactionId, choices } = JSON.parse(body);
            const text = choices 
              ? `${question}\n\n${choices.map((c, i) => \`\${i + 1}. \${c}\`).join('\\n')}`
              : question;
            await sock.sendMessage(chatId, { text });
            res.end(JSON.stringify({ success: true, used_buttons: false, used_list: !!choices }));
          } catch (error) {
            res.end(JSON.stringify({ success: false, error: error.message }));
          }
        });
        return;
      }

      res.statusCode = 404;
      res.end(JSON.stringify({ error: 'Not found' }));
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(\`WhatsApp bridge listening on port \${PORT}\`);
      startSocket();
    });

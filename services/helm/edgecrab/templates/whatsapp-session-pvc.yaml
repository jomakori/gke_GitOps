{{- if .Values.whatsapp.sessionStorage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edgecrab-whatsapp-session
  labels:
    app.kubernetes.io/name: edgecrab
spec:
  accessModes:
    - {{ .Values.whatsapp.sessionStorage.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.whatsapp.sessionStorage.size | default "1Gi" }}
  {{- if .Values.whatsapp.sessionStorage.storageClass }}
  storageClassName: {{ .Values.whatsapp.sessionStorage.storageClass }}
  {{- end }}
{{- end }}

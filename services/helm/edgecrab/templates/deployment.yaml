apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgecrab
  labels:
    app.kubernetes.io/name: edgecrab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: edgecrab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edgecrab
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      serviceAccountName: edgecrab

      containers:
        - name: edgecrab
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/edgecrab
          args:
            - gateway
            - start
            - --foreground

          env:
            - name: HOME
              value: /home/edgecrab
            - name: EDGECRAB_GATEWAY_PORT
              value: "{{ .Values.service.port }}"
            - name: EDGECRAB_GATEWAY_HOST
              value: "0.0.0.0"
            - name: WHATSAPP_ENABLED
              value: "true"
            - name: WHATSAPP_ALLOW_FROM
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: WHATSAPP_ALLOW_FROM
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: ZAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: ANTHROPIC_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: DEEPSEEK_API_KEY
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: MOONSHOT_API_KEY
            - name: OPENCODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: OPENCODE_API_KEY

          envFrom:
            - secretRef:
                name: edgecrab-secrets

          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: config
              mountPath: /home/edgecrab/.edgecrab/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /home/edgecrab/.edgecrab
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: edgecrab-config
        - name: data
          persistentVolumeClaim:
            claimName: edgecrab-data
        - name: tmp
          emptyDir: {}

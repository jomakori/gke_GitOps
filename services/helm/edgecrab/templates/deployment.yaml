apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgecrab
  labels:
    app.kubernetes.io/name: edgecrab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: edgecrab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edgecrab
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      serviceAccountName: edgecrab

      initContainers:
        - name: setup-bridge
          image: node:20-bookworm-slim
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Setting up WhatsApp bridge..."
              cp /scripts/bridge.js /bridge/
              cd /bridge
              echo "Installing npm dependencies..."
              npm install @whiskeysockets/baileys pino qrcode-terminal
              echo "Done!"
          volumeMounts:
            - name: bridge-scripts
              mountPath: /scripts
              readOnly: true
            - name: bridge-workdir
              mountPath: /bridge

      containers:
        # Main EdgeCrab container
        - name: edgecrab
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/edgecrab
          args:
            - gateway
            - start
            - --foreground

          env:
            - name: HOME
              value: /home/edgecrab
            - name: EDGECRAB_GATEWAY_PORT
              value: "{{ .Values.service.port }}"
            - name: EDGECRAB_GATEWAY_HOST
              value: "0.0.0.0"
            - name: OPENAI_COMPATIBLE_BASE_URL
              value: "https://api.z.ai/api/paas/v4"
            - name: WHATSAPP_ENABLED
              value: "true"
            - name: WHATSAPP_BRIDGE_URL
              value: "http://127.0.0.1:3000"
            - name: WHATSAPP_ALLOW_FROM
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: WHATSAPP_ALLOW_FROM
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: ZAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: ANTHROPIC_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: DEEPSEEK_API_KEY
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: MOONSHOT_API_KEY
            - name: OPENCODE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: OPENCODE_API_KEY

          envFrom:
            - secretRef:
                name: edgecrab-secrets

          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: config
              mountPath: /home/edgecrab/.edgecrab/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /home/edgecrab/.edgecrab

        - name: whatsapp-bridge
          image: node:20-bookworm-slim
          command:
            - /bin/sh
            - -c
            - |
              cd /bridge
              echo "Starting WhatsApp bridge on port 3000..."
              node bridge.js
          env:
            - name: WHATSAPP_MODE
              value: "self-chat"
            - name: WHATSAPP_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: edgecrab-secrets
                  key: WHATSAPP_ALLOW_FROM
          ports:
            - name: bridge
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: bridge-workdir
              mountPath: /bridge
            - name: whatsapp-session
              mountPath: /session
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: config
          configMap:
            name: edgecrab-config
        - name: data
          persistentVolumeClaim:
            claimName: edgecrab-data
        - name: bridge-scripts
          configMap:
            name: edgecrab-whatsapp-bridge
        - name: bridge-workdir
          emptyDir: {}
        - name: whatsapp-session
          {{- if .Values.whatsapp.sessionStorage.enabled }}
          persistentVolumeClaim:
            claimName: edgecrab-whatsapp-session
          {{- else }}
          emptyDir: {}
          {{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-discord
  labels:
    {{- include "kagent-discord.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: kagent-discord
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-discord
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      serviceAccountName: kagent-discord

      {{- if .Values.dopplerConfig }}
      imagePullSecrets:
        - name: ghcr-pull-secret
      {{- end }}

      containers:
        - name: discord-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kagent-discord-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_BOT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kagent-discord-secrets
                  key: DISCORD_BOT_CLIENT_ID
            - name: KAGENT_A2A_URL
              value: {{ .Values.config.kagentA2aUrl | quote }}
            - name: DISCORD_MENTION_ONLY
              value: {{ .Values.config.mentionOnly | quote }}
            - name: DISCORD_CONVERSATION_MODE
              value: {{ .Values.config.conversationMode | quote }}
            - name: DISCORD_PHASE_UPDATES
              value: {{ .Values.config.phaseUpdates | quote }}
            - name: DISCORD_POLL_UI
              value: {{ .Values.config.pollUI | quote }}
            {{- if .Values.config.channelOnly }}
            - name: DISCORD_CHANNEL_ONLY
              value: {{ .Values.config.channelOnly | quote }}
            {{- end }}
            {{- if .Values.config.startupChannel }}
            - name: DISCORD_STARTUP_CHANNEL
              value: {{ .Values.config.startupChannel | quote }}
            {{- end }}
            {{- if .Values.config.clientId }}
            - name: DISCORD_CLIENT_ID
              value: {{ .Values.config.clientId | quote }}
            {{- end }}

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

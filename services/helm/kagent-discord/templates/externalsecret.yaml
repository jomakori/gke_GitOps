{{- if .Values.dopplerConfig }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-discord-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 1m
  target:
    name: kagent-discord-secrets
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: DISCORD_BOT_TOKEN
    - secretKey: DISCORD_BOT_CLIENT_ID
      remoteRef:
        key: DISCORD_BOT_CLIENT_ID
{{- end }}

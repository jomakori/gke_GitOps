# Docs: https://github.com/headlamp-k8s/headlamp/tree/main/chart/headlamp

# User-facing ServiceAccount with ClusterRoleBinding for logging into Headlamp.
# Generate a token: kubectl create token <name> -n headlamp --duration=24h
userServiceAccount:
  name: headlamp-user
  clusterRole: cluster-admin

headlamp:
  # ┌─────────────────────────────────────────────────────────────────────────────┐
  # │   General Configuration                                                     │
  # └─────────────────────────────────────────────────────────────────────────────┘
  clusterRoleBinding:
    create: true
    clusterRoleName: cluster-admin

  # ┌─────────────────────────────────────────────────────────────────────────────┐
  # │   Headlamp Plugins Configuration                                            │
  # └─────────────────────────────────────────────────────────────────────────────┘
  initContainers:
    - command:
        - /bin/sh
        - -c
        - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
      image: quay.io/kubescape/headlamp-plugin:latest
      name: kubescape-plugin
      volumeMounts:
        - mountPath: /build/plugins
          name: headlamp-plugins
  volumeMounts:
    - name: headlamp-plugins
      mountPath: /build/plugins
  volumes:
    - name: headlamp-plugins
      emptyDir: {}

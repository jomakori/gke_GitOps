# Docs: https://github.com/opencost/opencost-helm-chart/tree/main/charts/opencost
opencost:
  networkPolicies:
    # -- Specifies whether networkpolicies should be created
    enabled: false

    # -- Internal Prometheus settings related to NetworkPolicies
    prometheus:
      # -- Namespace where internal Prometheus is installed
      namespace: kube-prometheus-stack
      port: 9090
      # -- Labels applied to the Prometheus server pod(s)
      labels:
        app.kubernetes.io/name: prometheus

  exporter:
    # -- Default cluster ID to use if cluster_id is not set in Prometheus metrics.
    defaultClusterId:
    extraEnv:
      EMIT_KSM_V1_METRICS: "false"
      EMIT_KSM_V1_METRICS_ONLY: "true"
      LOG_LEVEL: warn

  prometheus:
    internal:
      # -- Use in-cluster Prometheus
      enabled: true
      serviceName: kube-prometheus-stack-prometheus
      namespaceName: kube-prometheus-stack

  ui:
    # -- Enable OpenCost UI
    enabled: true

  metrics:
    serviceMonitor:
      # -- Create ServiceMonitor resource for scraping metrics using PrometheusOperator
      enabled: false

  # -- Node labels for pod assignment
  nodeSelector:
    intent: apps

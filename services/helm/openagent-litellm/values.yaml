# -- Doppler config; set by ArgoCD appset. Creates ExternalSecret when present.
dopplerConfig: ""

# -- LiteLLM image
image:
  repository: ghcr.io/berriai/litellm
  tag: "main-stable"
  pullPolicy: IfNotPresent

# -- Resource requests/limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- Service port
service:
  port: 4000

# -- LiteLLM proxy config (no database — file-based routing)
config:
  general_settings:
    disable_spend_logs: true
    disable_error_logs: true
    store_model_in_db: false
  router_settings:
    cooldown_time: 30
    num_retries: 2
    allowed_fails: 3
    enable_pre_call_checks: true
    fallbacks:
      - opencode/big-pickle: ["deepseek-v4-flash"]
      - opencode/north-mini-code-free: ["deepseek-v4-flash"]
      - opencode/deepseek-v4-flash-free: ["deepseek-v4-flash"]
  model_list:
    # OpenCode models (OpenAI-compatible API)
    - model_name: opencode/big-pickle
      litellm_params:
        model: openai/big-pickle
        api_key: os.environ/OPENCODE_API_KEY
        api_base: os.environ/OPENCODE_API_BASE
    - model_name: opencode/north-mini-code-free
      litellm_params:
        model: openai/north-mini-code-free
        api_key: os.environ/OPENCODE_API_KEY
        api_base: os.environ/OPENCODE_API_BASE
    - model_name: opencode/deepseek-v4-flash-free
      litellm_params:
        model: openai/deepseek-v4-flash-free
        api_key: os.environ/OPENCODE_API_KEY
        api_base: os.environ/OPENCODE_API_BASE
    - model_name: opencode/mimo-v2.5-free
      litellm_params:
        model: openai/mimo-v2.5-free
        api_key: os.environ/OPENCODE_API_KEY
        api_base: os.environ/OPENCODE_API_BASE
    # Anthropic models (native LiteLLM support)
    - model_name: anthropic/claude-opus-4-7
      litellm_params:
        model: anthropic/claude-opus-4-7
        api_key: os.environ/ANTHROPIC_API_KEY
    # Moonshot models (native LiteLLM support)
    - model_name: moonshotai/kimi-k2.6
      litellm_params:
        model: moonshot/kimi-k2.6
        api_key: os.environ/MOONSHOT_API_KEY
    # DeepSeek models (native LiteLLM support)
    - model_name: deepseek-v4-flash
      litellm_params:
        model: deepseek/deepseek-v4-flash
        api_key: os.environ/DEEPSEEK_API_KEY
    - model_name: deepseek-v4-pro
      litellm_params:
        model: deepseek/deepseek-v4-pro
        api_key: os.environ/DEEPSEEK_API_KEY
    # z.ai models (native LiteLLM support)
    - model_name: zai/glm-4.7
      litellm_params:
        model: zai/glm-4.7
        api_key: os.environ/ZAI_API_KEY
    - model_name: zai/glm-4.7-flash
      litellm_params:
        model: zai/glm-4.7-flash
        api_key: os.environ/ZAI_API_KEY

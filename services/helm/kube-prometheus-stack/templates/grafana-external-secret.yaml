apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig }}
  refreshInterval: 1m
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ""

# istiod — Istio control plane
# Ambient mode: no per-pod sidecars; ztunnel handles L4 mTLS at node level.
istiod:
  # ── Ambient mode ──────────────────────────────────────────────────────
  profile: ambient

  # ── Mesh-wide STRICT mTLS (PeerAuthentication is set in istio-config) ─
  meshConfig:
    # Propagate trust domain for SPIFFE identity
    trustDomain: cluster.local
    # Access logs to stdout for Prometheus scraping
    accessLogFile: /dev/stdout
    # Default proxy config — applies to any injected sidecars (opt-in services)
    defaultConfig:
      proxyStatsMatcher:
        inclusionRegexps:
          - ".*outlier_detection.*"
          - ".*circuit_breakers.*"
          - ".*upstream_rq_retry.*"
          - ".*upstream_cx_.*"
    # Enable Prometheus metrics merging
    enablePrometheusMerge: true

  # ── Resource limits ────────────────────────────────────────────────────
  pilot:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    nodeSelector:
      intent: apps

  # ── Telemetry (Prometheus) ─────────────────────────────────────────────
  telemetry:
    enabled: true
    v2:
      prometheus:
        enabled: true

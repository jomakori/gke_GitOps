# Docs: https://github.com/external-secrets/external-secrets/tree/main/deploy/charts/external-secrets
external-secrets:
  # -- If set, install and upgrade CRDs through helm chart.
  installCRDs: true
  replicaCount: 2
  serviceAccount:
    create: true
  webhook:
    certManager:
      enabled: false

# ClusterSecretStores — one per Doppler config, all using the same machine token
clusterSecretStores:
  svc_grafana:
    project: devops
    config: svc_grafana
  svc_mongodb:
    project: devops
    config: svc_mongodb
  svc_postgres_operator:
    project: devops
    config: svc_postgres_operator
  svc_cloudflare:
    project: devops
    config: svc_cloudflare
  svc_onedev:
    project: devops
    config: svc_onedev
  svc_edgecrab:
    project: devops
    config: svc_edgecrab
  zurabase-dev:
    project: zurabase
    config: dev
  zurabase-stg:
    project: zurabase
    config: stg
  zurabase-prd:
    project: zurabase
    config: prd

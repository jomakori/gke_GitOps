# hermes-workspace values
# These are accessed from the parent chart as hermes-workspace.*
dopplerConfig: "svc_openagent"
storageClass: "local-path"

image:
  repository: ghcr.io/outsourc-e/hermes-workspace
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 3000

hermes:
  apiUrl: "http://openagent-litellm.openagent.svc.cluster.local:4000"
  dashboardUrl: "http://openagent-hermes.openagent.svc.cluster.local:9119"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

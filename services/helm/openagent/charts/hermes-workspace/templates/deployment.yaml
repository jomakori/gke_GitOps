apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-workspace.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-workspace.labels" . | nindent 4 }}
    app.kubernetes.io/component: hermes-workspace
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hermes-workspace.labels" . | nindent 6 }}
      app.kubernetes.io/component: hermes-workspace
  template:
    metadata:
      labels:
        {{- include "hermes-workspace.labels" . | nindent 8 }}
        app.kubernetes.io/component: hermes-workspace
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: swarm-config
          configMap:
            name: openagent-swarm
            items:
              - key: swarm.yaml
                path: swarm.yaml
        - name: runtime-data
          emptyDir: {}
        - name: hermes-home
          emptyDir: {}
        - name: shared-bin
          emptyDir: {}
      initContainers:
        - name: install-hermes-tmux
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              apt-get update && apt-get install -y tmux python3-venv && \
              python3 -m venv /shared/venv && \
              /shared/venv/bin/pip install hermes-agent && \
              cp /usr/bin/tmux /shared/bin/tmux
          volumeMounts:
            - name: shared-bin
              mountPath: /shared/bin
      containers:
        - name: hermes-workspace
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: PATH
              value: "/shared/venv/bin:/shared/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin"
            - name: HOST
              value: "0.0.0.0"
            - name: HERMES_ALLOW_INSECURE_REMOTE
              value: "1"
            - name: COOKIE_SECURE
              value: "0"
            - name: HERMES_API_URL
              value: {{ .Values.hermes.apiUrl | quote }}
            - name: HERMES_DASHBOARD_URL
              value: {{ .Values.hermes.dashboardUrl | quote }}
            - name: OPENAI_API_KEY
              value: {{ .Values.hermes.apiKey | quote }}
          envFrom:
            - secretRef:
                name: openagent-secrets
          volumeMounts:
            - name: swarm-config
              mountPath: /app/swarm.yaml
              subPath: swarm.yaml
              readOnly: true
            - name: runtime-data
              mountPath: /app/.runtime
            - name: hermes-home
              mountPath: /home/workspace/.hermes
            - name: shared-bin
              mountPath: /shared/bin
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

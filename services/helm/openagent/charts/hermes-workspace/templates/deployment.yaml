apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-workspace.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermes-workspace.labels" . | nindent 4 }}
    app.kubernetes.io/component: hermes-workspace
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hermes-workspace.labels" . | nindent 6 }}
      app.kubernetes.io/component: hermes-workspace
  template:
    metadata:
      labels:
        {{- include "hermes-workspace.labels" . | nindent 8 }}
        app.kubernetes.io/component: hermes-workspace
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: swarm-config
          configMap:
            name: openagent-swarm
            items:
              - key: swarm.yaml
                path: swarm.yaml
        - name: runtime-data
          emptyDir: {}
        - name: hermes-home
          emptyDir: {}
        - name: shared-bin
          emptyDir: {}
        - name: hermes-config
          configMap:
            name: openagent-swarm-hermes-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: local-bin
          emptyDir: {}
        - name: k8s-gitops-context
          configMap:
            name: openagent-k8s-gitops-context
      initContainers:
        - name: install-hermes-tmux
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              apt-get update && apt-get install -y tmux python3-venv && \
              python3 -m venv /shared/bin/venv && \
              /shared/bin/venv/bin/pip install hermes-agent && \
              cp /usr/bin/tmux /shared/bin/tmux && \
              ldd /usr/bin/tmux | grep -o '/[^ ]*' | while read lib; do cp "$lib" /shared/bin/ 2>/dev/null; done

              # Create symlinks in ~/.local/bin/ for workspace binary resolution
              HERMES_BIN=/shared/bin/venv/bin/hermes
              chmod 755 "$HERMES_BIN"
              ln -sf "$HERMES_BIN" /shared/.local/bin/hermes
              ln -sf /shared/bin/tmux /shared/.local/bin/tmux

              # Create central model mapping (ONE file to edit when swapping models)
              echo 'orchestrator=claude/sonnet-4' > /shared/bin/worker-models.cfg
              for entry in \
                'supervisor=claude/sonnet-4' \
                'strategist=deepseek-v4-pro' \
                'reviewer=deepseek-v4-pro' \
                'architect=claude/opus-4' \
                'builder=minimax/M3' \
                'junior-builder=deepseek-v4-flash' \
                'researcher=zai/glm-4.7-flash' \
                'explorer=zai/glm-4.7-flash'; do
                echo "$entry" >> /shared/bin/worker-models.cfg
              done

              # Create single wrapper that reads model from central mapping
              echo '#!/bin/sh' > /shared/bin/swarm-wrapper.sh
              echo 'worker=$(basename "$0")' >> /shared/bin/swarm-wrapper.sh
              echo 'model=$(grep "^${worker}=" /shared/bin/worker-models.cfg | cut -d= -f2)' >> /shared/bin/swarm-wrapper.sh
              echo 'if [ -n "$model" ]; then exec /shared/bin/venv/bin/hermes -m "$model" "$@"; else exec /shared/bin/venv/bin/hermes "$@"; fi' >> /shared/bin/swarm-wrapper.sh
              chmod 755 /shared/bin/swarm-wrapper.sh

              # Symlink each worker name to the single wrapper
              for worker in orchestrator supervisor strategist reviewer architect builder junior-builder researcher explorer; do
                ln -sf /shared/bin/swarm-wrapper.sh /shared/.local/bin/$worker
              done
          volumeMounts:
            - name: shared-bin
              mountPath: /shared/bin
            - name: local-bin
              mountPath: /shared/.local/bin
      containers:
        - name: hermes-workspace
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: PATH
              value: "/shared/bin/venv/bin:/shared/bin:/home/workspace/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin"
            - name: LD_LIBRARY_PATH
              value: "/shared/bin"
            - name: HERMES_CLI_BIN
              value: /shared/bin/venv/bin/hermes
            - name: TMUX_BIN
              value: /shared/bin/tmux
            - name: HOST
              value: "0.0.0.0"
            - name: HERMES_ALLOW_INSECURE_REMOTE
              value: "1"
            - name: COOKIE_SECURE
              value: "0"
            - name: HERMES_API_URL
              value: {{ .Values.hermes.apiUrl | quote }}
            - name: HERMES_DASHBOARD_URL
              value: {{ .Values.hermes.dashboardUrl | quote }}
            - name: OPENAI_API_KEY
              value: {{ .Values.hermes.apiKey | quote }}
          envFrom:
            - secretRef:
                name: openagent-secrets
          volumeMounts:
            - name: swarm-config
              mountPath: /app/swarm.yaml
              subPath: swarm.yaml
              readOnly: true
            - name: runtime-data
              mountPath: /app/.runtime
            - name: hermes-home
              mountPath: /home/workspace/.hermes
            - name: hermes-config
              mountPath: /home/workspace/.hermes/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: shared-bin
              mountPath: /shared/bin
              readOnly: true
            - name: local-bin
              mountPath: /home/workspace/.local/bin
              readOnly: true
            - name: k8s-gitops-context
              mountPath: /workspace/reference/k8s-gitops-context.md
              subPath: k8s-gitops-context.md
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

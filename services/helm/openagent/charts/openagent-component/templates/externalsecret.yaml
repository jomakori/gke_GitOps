{{- if .Values.bot.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "openagent-component.botName" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagent-component.labels" . | nindent 4 }}
    app.kubernetes.io/component: discord-bot
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 24h
  target:
    name: {{ include "openagent-component.botName" . }}-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: ".*"
{{- end }}

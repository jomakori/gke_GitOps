{{- if .Values.bot.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openagent-component.botName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagent-component.labels" . | nindent 4 }}
    app.kubernetes.io/component: discord-bot
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  selector:
    {{- include "openagent-component.labels" . | nindent 4 }}
    app.kubernetes.io/component: discord-bot
  ports:
    - port: {{ .Values.bot.service.port }}
      targetPort: http
      name: http
{{- end }}

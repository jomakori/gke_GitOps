{{- if .Values.bot.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openagent-component.botName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openagent-component.labels" . | nindent 4 }}
    app.kubernetes.io/component: discord-bot
  annotations:
    argocd.argoproj.io/sync-wave: "1"
{{- end }}

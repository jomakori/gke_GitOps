# openagent-component values
# These are accessed from the parent chart as openagent-component.headroom.* and openagent-component.bot.*
dopplerConfig: "svc_openagent"
storageClass: "local-path"

headroom:
  enabled: false
  image:
    repository: ghcr.io/chopratejas/headroom
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 8787
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  storage:
    size: 2Gi
    accessMode: ReadWriteOnce
  litellmUrl: "http://litellm-openagent-litellm.openagent.svc.cluster.local:4000/v1"

bot:
  enabled: false
  image:
    repository: ghcr.io/jomakori/gke_gitops/openagent-discord-bot
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    reposSize: 1Gi
  config:
    mentionOnly: false
    conversationMode: "threaded"
    phaseUpdates: true
    pollUI: true
    startupChannel: "chat"
    channelOnly: ""
    clientId: ""
    dashboardUrl: "https://openagent.maklab.net"
    thinkMode: "full"
  version:
    configMapName: "openagent-discord-version"

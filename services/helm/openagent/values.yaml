# Global config (injected by Terraform → ArgoCD)
clusterDomain: "maklab.net"
storageClass: "local-path"
dopplerConfig: "svc_openagent"
namespace: "openagent"
global: {}

# Shared GHCR pull secret
ghcrPullSecret: ""

# ── LiteLLM upstream chart values ──────────────────────────────────
litellm:
  enabled: true
  fullnameOverride: "openagent-litellm"
  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-stable"
    pullPolicy: IfNotPresent
  service:
    port: 4000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  db:
    deployStandalone: false
    useExisting: true
    endpoint: "openagent-pg.openagent.svc.cluster.local"
    database: "litellm"
    secret:
      name: "openagent-litellm-secrets"
      usernameKey: "OPENAGENT_PG_USER"
      passwordKey: "OPENAGENT_PG_PASSWORD"
  masterkeySecretName: "openagent-litellm-masterkey"
  masterkeySecretKey: "masterkey"
  environmentSecrets:
    - "openagent-secrets"
  proxy_config:
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
    model_list:
      - model_name: opencode/big-pickle
        litellm_params:
          model: openai/big-pickle
          api_key: os.environ/OPENCODE_API_KEY
          api_base: os.environ/OPENCODE_API_BASE
          order: 1
      - model_name: opencode/north-mini-code-free
        litellm_params:
          model: openai/north-mini-code-free
          api_key: os.environ/OPENCODE_API_KEY
          api_base: os.environ/OPENCODE_API_BASE
          order: 1
      - model_name: opencode/deepseek-v4-flash-free
        litellm_params:
          model: openai/deepseek-v4-flash-free
          api_key: os.environ/OPENCODE_API_KEY
          api_base: os.environ/OPENCODE_API_BASE
          order: 1
      - model_name: opencode/mimo-v2.5-free
        litellm_params:
          model: openai/mimo-v2.5-free
          api_key: os.environ/OPENCODE_API_KEY
          api_base: os.environ/OPENCODE_API_BASE
          order: 1
      - model_name: anthropic/claude-opus-4-7
        litellm_params:
          model: anthropic/claude-opus-4-7
          api_key: os.environ/ANTHROPIC_API_KEY
          order: 1
      - model_name: moonshotai/kimi-k2.6
        litellm_params:
          model: moonshot/kimi-k2.6
          api_key: os.environ/MOONSHOT_API_KEY
          order: 1
      - model_name: deepseek-v4-flash
        litellm_params:
          model: deepseek/deepseek-v4-flash
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 1
      - model_name: deepseek-v4-flash
        litellm_params:
          model: zai/glm-4.7-flash
          api_key: os.environ/ZAI_API_KEY
          order: 2
      - model_name: deepseek-v4-pro
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          cache: true
          order: 1
      - model_name: deepseek-v4-pro
        litellm_params:
          model: zai/glm-4.7
          api_key: os.environ/ZAI_API_KEY
          order: 2
      - model_name: zai/glm-4.7
        litellm_params:
          model: zai/glm-4.7
          api_key: os.environ/ZAI_API_KEY
          order: 1
      - model_name: zai/glm-4.7
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
      - model_name: zai/glm-4.7-flash
        litellm_params:
          model: zai/glm-4.7-flash
          api_key: os.environ/ZAI_API_KEY
          order: 1
      - model_name: zai/glm-4.7-flash
        litellm_params:
          model: deepseek/deepseek-v4-flash
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
      - model_name: minimax/M3
        litellm_params:
          model: openai/MiniMax-M3
          api_key: os.environ/MINIMAX_API_KEY
          api_base: os.environ/MINIMAX_API_BASE
          order: 1
      - model_name: minimax/M3
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
      - model_name: minimax/M2.7
        litellm_params:
          model: openai/MiniMax-M2.7
          api_key: os.environ/MINIMAX_API_KEY
          api_base: os.environ/MINIMAX_API_BASE
          order: 1
      - model_name: minimax/M2.7
        litellm_params:
          model: deepseek/deepseek-v4-flash
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
      - model_name: claude/sonnet-5
        litellm_params:
          model: openai/claude-sonnet-5
          api_key: os.environ/CLAUDE_PROXY_API_KEY
          api_base: http://claude-proxy.openagent.svc.cluster.local:4523/v1
          order: 1
      - model_name: claude/sonnet-5
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
      - model_name: claude/sonnet-4
        litellm_params:
          model: openai/claude-sonnet-4
          api_key: os.environ/CLAUDE_PROXY_API_KEY
          api_base: http://claude-proxy.openagent.svc.cluster.local:4523/v1
          order: 1
      - model_name: claude/sonnet-4
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
      - model_name: claude/opus-4
        litellm_params:
          model: openai/claude-opus-4
          api_key: os.environ/CLAUDE_PROXY_API_KEY
          api_base: http://claude-proxy.openagent.svc.cluster.local:4523/v1
          order: 1
      - model_name: claude/opus-4
        litellm_params:
          model: deepseek/deepseek-v4-pro
          api_key: os.environ/DEEPSEEK_API_KEY
          order: 2
    fallbacks:
      - opencode/big-pickle: ["deepseek-v4-flash"]
      - opencode/north-mini-code-free: ["deepseek-v4-flash"]
      - opencode/deepseek-v4-flash-free: ["deepseek-v4-flash"]
      - opencode/mimo-v2.5-free: ["deepseek-v4-flash"]
      - anthropic/claude-opus-4-7: ["claude/opus-4", "deepseek-v4-pro"]
      - moonshotai/kimi-k2.6: ["deepseek-v4-pro", "zai/glm-4.7"]
      - deepseek-v4-flash: ["zai/glm-4.7-flash", "opencode/deepseek-v4-flash-free"]
      - deepseek-v4-pro: ["zai/glm-4.7", "deepseek-v4-flash"]
      - zai/glm-4.7: ["deepseek-v4-pro", "zai/glm-4.7-flash"]
      - zai/glm-4.7-flash: ["deepseek-v4-flash", "opencode/deepseek-v4-flash-free"]
      - minimax/M3: ["deepseek-v4-pro", "zai/glm-4.7"]
      - minimax/M2.7: ["deepseek-v4-flash", "zai/glm-4.7-flash"]
      - claude/sonnet-5: ["deepseek-v4-pro", "zai/glm-4.7"]
      - claude/sonnet-4: ["deepseek-v4-pro", "zai/glm-4.7"]
      - claude/opus-4: ["claude/sonnet-5", "deepseek-v4-pro"]

# ── Hermes Agent ────────────────────────────────────────────────────
hermes:
  enabled: true
  config:
    model:
      default: deepseek-v4-flash
      provider: litellm
    providers:
      litellm:
        base_url: http://openagent-litellm.openagent.svc.cluster.local:4000/v1
        key_env: OPENAI_API_KEY
        discover_models: true
    plugins:
      enabled:
        - discord-platform
    mcp_servers:
      github:
        command: "npx"
        args: ["-y", "@modelcontextprotocol/server-github"]
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: "${MCP_GITHUB_TOKEN}"
          npm_config_loglevel: "error"
        tools:
          include: [list_issues, create_issue, update_issue, search_code, search_repositories, get_file_contents]
          resources: false
          prompts: false

      argocd:
        command: "npx"
        args: ["-y", "argocd-mcp@latest", "stdio"]
        env:
          ARGOCD_API_TOKEN: "${MCP_ARGOCD_TOKEN}"
          ARGOCD_BASE_URL: "${MCP_ARGOCD_URL}"
        tools:
          resources: false
          prompts: false

      grafana:
        command: "npx"
        args: ["-y", "@leval/mcp-grafana"]
        env:
          GRAFANA_URL: "${MCP_GRAFANA_URL}"
          GRAFANA_SERVICE_ACCOUNT_TOKEN: "${MCP_GRAFANA_TOKEN}"
        tools:
          resources: false
          prompts: false

      kubectl:
        url: "http://kubernetes-mcp-server.openagent.svc.cluster.local:8000/mcp"
        timeout: 60
        tools:
          resources: false
          prompts: false

      doppler:
        command: "npx"
        args: ["-y", "@dopplerhq/mcp-server"]
        env:
          DOPPLER_TOKEN: "${MCP_DOPPLER_TOKEN}"
        tools:
          resources: false
          prompts: false

      google-workspace:
        command: "npx"
        args: ["-y", "google-workspace-mcp"]
        env:
          GOOGLE_CREDENTIALS_PATH: "/opt/data/.google-mcp/credentials.json"
  env:
    OPENAI_API_KEY: unused
  extraEnv:
    - name: DISCORD_BOT_TOKEN
      valueFrom:
        secretKeyRef:
          name: openagent-secrets
          key: DISCORD_BOT_TOKEN
    - name: DISCORD_BOT_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: openagent-secrets
          key: DISCORD_BOT_CLIENT_ID
    - name: HERMES_DASHBOARD
      value: "1"
    - name: HERMES_DASHBOARD_HOST
      value: "127.0.0.1"
    - name: HERMES_DASHBOARD_PORT
      value: "19119"
    - name: DISCORD_ALLOW_ALL_USERS
      value: "true"
    - name: API_SERVER_ENABLED
      value: "true"
    - name: API_SERVER_KEY
      value: "hermes-api-server-key-1234"
    - name: API_SERVER_HOST
      value: "0.0.0.0"
    - name: API_SERVER_PORT
      value: "8642"
    - name: DASHBOARD_BASE_URL
      value: "https://openagent.maklab.net"
  extraVolumes:
    - name: hermes-hooks
      configMap:
        name: openagent-hermes-hooks
    - name: k8s-gitops-context
      configMap:
        name: openagent-k8s-gitops-context
  extraVolumeMounts:
    - name: hermes-hooks
      mountPath: /opt/data/hooks/discord-session-link
      readOnly: true
    - name: k8s-gitops-context
      mountPath: /opt/data/memories/k8s-gitops-context.md
      subPath: k8s-gitops-context.md
      readOnly: true
  extraContainers:
    - name: dashboard-proxy
      image: nginx:alpine
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c"]
      args:
        - |
          echo 'server {
            listen 9119;
            location / {
              proxy_pass http://127.0.0.1:19119;
              proxy_set_header Host 127.0.0.1;
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
            }
          }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  command:
    - /init
  args:
    - hermes
    - gateway
    - run
  extraEnvFrom:
    - secretRef:
        name: openagent-secrets
  service:
    enabled: true
    port: 9119
    extraPorts:
      - port: 8642
        name: api-server

# ── Hermes Workspace ────────────────────────────────────────────────
hermes-workspace:
  enabled: true

# ── Component subchart values ──────────────────────────────────────
# These are passed to the openagent-component subchart.
# The subchart name (openagent-component) is the key Helm uses to pass values.
# component.enabled is the Chart.yaml condition key for the subchart dependency.
component:
  enabled: true
openagent-component:
  storageClass: "local-path"
  headroom:
    enabled: true
    image:
      repository: ghcr.io/chopratejas/headroom
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      port: 8787
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    storage:
      size: 2Gi
      accessMode: ReadWriteOnce
    litellmUrl: "http://openagent-litellm.openagent.svc.cluster.local:4000/v1"
  bot:
    enabled: false
    image:
      repository: ghcr.io/jomakori/gke_gitops/openagent-discord-bot
      tag: "0.9.6"
      pullPolicy: Always
    service:
      port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      reposSize: 1Gi
    config:
      mentionOnly: false
      conversationMode: "threaded"
      phaseUpdates: true
      pollUI: true
      startupChannel: "chat"
      channelOnly: ""
      clientId: ""
      dashboardUrl: "https://openagent.maklab.net"
      thinkMode: "full"
    version:
      configMapName: "openagent-discord-version"

# ── Shared DB ───────────────────────────────────────────
postgres:
  enabled: true
  clusterName: "openagent-pg"
  configName: "openagent-pg-config"
  poolingConfigName: "openagent-pg-pooling"
  instances: 1
  storage: 5Gi
  version: "18"
  profile: "development"

# ── Dashboard (VirtualService) ─────────────────────────────────────
dashboard:
  subdomain: "openagent"
  destination:
    host: "openagent-hermes-workspace.openagent.svc.cluster.local"
    port: 3000

# ── VPA ────────────────────────────────────────────────────────────
vpa:
  enabled: true

# ── Claude Proxy ────────────────────────────────────────────────────
claudeProxy:
  enabled: true
  image:
    repository: ghcr.io/jomakori/claude-proxy
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 4523
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

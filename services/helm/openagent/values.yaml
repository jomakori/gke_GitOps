# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  OpenAgent Umbrella Values                                                   │
# │                                                                              │
# │  Single source of truth for the entire openagent stack.                     │
# │  Everything is inlined in the umbrella's templates/ — KISS, no subcharts.   │
# └──────────────────────────────────────────────────────────────────────────────┘

# Global config (injected by Terraform → ArgoCD)
clusterDomain: "maklab.net"
storageClass: "local-path"
dopplerConfig: "svc_openagent"
namespace: "openagent"

# Shared GHCR pull secret (base64-encoded dockerconfigjson for ghcr.io).
# Leave empty to skip creating the Secret + imagePullSecrets.
# When non-empty, this single Secret is created once and referenced by all components.
ghcrPullSecret: ""

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  Component config                                                           │
# └──────────────────────────────────────────────────────────────────────────────┘

headroom:
  enabled: true
  image:
    repository: ghcr.io/chopratejas/headroom
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 8787
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 2000m, memory: 2Gi }
  storage:
    size: 2Gi
    accessMode: ReadWriteOnce
  litellmUrl: "http://openagent-litellm.openagent.svc.cluster.local:4000/v1"

litellm:
  enabled: true
  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-stable"
    pullPolicy: IfNotPresent
  service:
    port: 4000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 2000m, memory: 2Gi }
  fallbacks:
    - opencode/big-pickle: ["deepseek-v4-flash"]
    - opencode/north-mini-code-free: ["deepseek-v4-flash"]
    - opencode/deepseek-v4-flash-free: ["deepseek-v4-flash"]
  model_list:
    - model_name: opencode/big-pickle
      litellm_params:
        model: openai/big-pickle
        api_key: os.environ/OPENCODE_API_KEY  # pragma: allowlist secret
        api_base: os.environ/OPENCODE_API_BASE  # pragma: allowlist secret
    - model_name: opencode/north-mini-code-free
      litellm_params:
        model: openai/north-mini-code-free
        api_key: os.environ/OPENCODE_API_KEY  # pragma: allowlist secret
        api_base: os.environ/OPENCODE_API_BASE  # pragma: allowlist secret
    - model_name: opencode/deepseek-v4-flash-free
      litellm_params:
        model: openai/deepseek-v4-flash-free
        api_key: os.environ/OPENCODE_API_KEY  # pragma: allowlist secret
        api_base: os.environ/OPENCODE_API_BASE  # pragma: allowlist secret
    - model_name: opencode/mimo-v2.5-free
      litellm_params:
        model: openai/mimo-v2.5-free
        api_key: os.environ/OPENCODE_API_KEY  # pragma: allowlist secret
        api_base: os.environ/OPENCODE_API_BASE  # pragma: allowlist secret
    - model_name: anthropic/claude-opus-4-7
      litellm_params:
        model: anthropic/claude-opus-4-7
        api_key: os.environ/ANTHROPIC_API_KEY  # pragma: allowlist secret
    - model_name: moonshotai/kimi-k2.6
      litellm_params:
        model: moonshot/kimi-k2.6
        api_key: os.environ/MOONSHOT_API_KEY  # pragma: allowlist secret
    - model_name: deepseek-v4-flash
      litellm_params:
        model: deepseek/deepseek-v4-flash
        api_key: os.environ/DEEPSEEK_API_KEY  # pragma: allowlist secret
    - model_name: deepseek-v4-pro
      litellm_params:
        model: deepseek/deepseek-v4-pro
        api_key: os.environ/DEEPSEEK_API_KEY  # pragma: allowlist secret
    - model_name: zai/glm-4.7
      litellm_params:
        model: zai/glm-4.7
        api_key: os.environ/ZAI_API_KEY  # pragma: allowlist secret
    - model_name: zai/glm-4.7-flash
      litellm_params:
        model: zai/glm-4.7-flash
        api_key: os.environ/ZAI_API_KEY  # pragma: allowlist secret
    - model_name: minimax/M3
      litellm_params:
        model: openai/MiniMax-M3
        api_key: os.environ/MINIMAX_API_KEY  # pragma: allowlist secret
        api_base: os.environ/MINIMAX_API_BASE  # pragma: allowlist secret
    - model_name: minimax/M2.7
      litellm_params:
        model: openai/MiniMax-M2.7
        api_key: os.environ/MINIMAX_API_KEY  # pragma: allowlist secret
        api_base: os.environ/MINIMAX_API_BASE  # pragma: allowlist secret

discord:
  enabled: true
  image:
    repository: ghcr.io/jomakori/gke_gitops/openagent-discord-bot
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  config:
    mentionOnly: false
    conversationMode: "threaded"
    phaseUpdates: true
    pollUI: true
    startupChannel: "chat"
    channelOnly: ""
    clientId: ""
    dashboardUrl: "https://openagent.maklab.net"
  version:
    configMapName: "openagent-discord-version"

postgres:
  enabled: true
  clusterName: "openagent-pg"
  configName: "openagent-pg-config"
  poolingConfigName: "openagent-pg-pooling"
  instances: 1
  storage: 5Gi
  version: "18"
  profile: "development"

dashboard:
  subdomain: "openagent"
  destination:
    host: "sympozium-apiserver.sympozium-system.svc.cluster.local"
    port: 8080

{{- if .Values.headroom.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openagent-headroom-data
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: headroom
spec:
  accessModes:
    - {{ .Values.headroom.storage.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.headroom.storage.size | default "2Gi" }}
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass }}
  {{- end }}
{{- end }}

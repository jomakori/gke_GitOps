apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openagent-pg-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 24h
  target:
    name: openagent-pg-secrets
    creationPolicy: Owner
  data:
    - secretKey: dbPassword  # pragma: allowlist secret
      remoteRef:
        key: DATABASE_PASSWORD

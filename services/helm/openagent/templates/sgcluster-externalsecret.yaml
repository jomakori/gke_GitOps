apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openagent-pg-credentials
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 24h
  target:
    name: openagent-pg-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-password  # pragma: allowlist secret
      remoteRef:
        key: OPENAGENT_PG_SUPERUSER_PASSWORD
    - secretKey: postgres-user
      remoteRef:
        key: OPENAGENT_PG_SUPERUSER_USERNAME

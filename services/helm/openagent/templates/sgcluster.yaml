apiVersion: stackgres.io/v1
kind: SGCluster
metadata:
  name: {{ .Values.postgres.clusterName | default "openagent-pg" }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: {{ .Values.postgres.instances | default 1 }}
  postgres:
    version: {{ .Values.postgres.version | default "18" | quote }}
  profile: {{ .Values.postgres.profile | default "development" | quote }}
  pods:
    persistentVolume:
      size: {{ .Values.postgres.storage | default "5Gi" }}
      {{- if .Values.storageClass }}
      storageClass: {{ .Values.storageClass }}
      {{- end }}
    disableMetricsExporter: true
    disableConnectionPooling: true
  configurations:
    sgPostgresConfig: {{ .Values.postgres.configName | default "openagent-pg-config" | quote }}
    sgPoolingConfig: {{ .Values.postgres.poolingConfigName | default "openagent-pg-pooling" | quote }}

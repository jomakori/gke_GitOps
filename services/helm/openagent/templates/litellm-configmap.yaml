{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: openagent-litellm-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: litellm
data:
  litellm_config.yaml: |
    general_settings:
      disable_spend_logs: false
      disable_error_logs: false
      store_model_in_db: true
    router_settings:
      cooldown_time: 30
      num_retries: 2
      allowed_fails: 3
      enable_pre_call_checks: true
      fallbacks:
    {{- range $idx, $fb := .Values.litellm.fallbacks }}
    {{- range $model, $targets := $fb }}
        - {{ $model | quote }}: {{ toJson $targets }}
    {{- end }}
    {{- end }}
    model_list:
    {{- range .Values.litellm.model_list }}
      - model_name: {{ .model_name }}
        litellm_params:
          model: {{ .litellm_params.model }}
          api_key: {{ .litellm_params.api_key }}
    {{- if .litellm_params.api_base }}
          api_base: {{ .litellm_params.api_base }}
    {{- end }}
    {{- end }}
{{- end }}

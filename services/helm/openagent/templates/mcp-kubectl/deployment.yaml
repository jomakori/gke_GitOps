apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: openagent
  labels:
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/component: mcp-kubectl
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-mcp-server
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/component: mcp-kubectl
    spec:
      volumes:
        - name: kubeconfig
          secret:
            secretName: mcp-kubectl-config
      containers:
      - name: server
        image: ghcr.io/containers/kubernetes-mcp-server:latest
        args:
        - --kubeconfig
        - /etc/mcp-kubeconfig/kubeconfig
        - --cluster-provider
        - kubeconfig
        - --port
        - "8000"
        - --stateless
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/mcp-kubeconfig
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: openagent
  labels:
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/component: mcp-kubectl
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-mcp-server
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/component: mcp-kubectl
    spec:
      serviceAccountName: mcp-kubectl-server
      containers:
      - name: server
        image: ghcr.io/containers/kubernetes-mcp-server:latest
        args:
        - --port
        - "8000"
        - --stateless
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-kubectl-config
              key: MCP_GITHUB_TOKEN
        - name: ARGOCD_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-kubectl-config
              key: MCP_ARGOCD_TOKEN
        - name: ARGOCD_URL
          valueFrom:
            secretKeyRef:
              name: mcp-kubectl-config
              key: MCP_ARGOCD_URL
        - name: GRAFANA_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-kubectl-config
              key: MCP_GRAFANA_TOKEN
        - name: GRAFANA_URL
          valueFrom:
            secretKeyRef:
              name: mcp-kubectl-config
              key: MCP_GRAFANA_URL
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-kubectl-config
  namespace: openagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-svc-openagent
  refreshInterval: 24h
  target:
    name: mcp-kubectl-config
    creationPolicy: Owner
  data:
    - secretKey: MCP_GITHUB_TOKEN
      remoteRef:
        key: MCP_GITHUB_TOKEN
    - secretKey: MCP_ARGOCD_TOKEN
      remoteRef:
        key: MCP_ARGOCD_TOKEN
    - secretKey: MCP_ARGOCD_URL
      remoteRef:
        key: MCP_ARGOCD_URL
    - secretKey: MCP_GRAFANA_TOKEN
      remoteRef:
        key: MCP_GRAFANA_TOKEN
    - secretKey: MCP_GRAFANA_URL
      remoteRef:
        key: MCP_GRAFANA_URL

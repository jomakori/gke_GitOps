apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-kubectl-config
  namespace: openagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-svc-openagent
  refreshInterval: 24h
  target:
    name: mcp-kubectl-config
    creationPolicy: Owner
  data:
    - secretKey: kubeconfig
      remoteRef:
        key: MCP_KUBECONFIG

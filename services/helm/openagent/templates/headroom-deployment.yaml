{{- if .Values.headroom.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openagent-headroom
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: headroom
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "openagent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: openagent
      app.kubernetes.io/managed-by: {{ .Release.Service }}
      helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
      app.kubernetes.io/component: headroom
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "openagent.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/component: headroom
    spec:
      serviceAccountName: openagent-headroom
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
{{ if .Values.dopplerConfig }}
      imagePullSecrets:
        - name: ghcr-pull-secret
{{ end }}
      containers:
        - name: headroom
          image: "{{ .Values.headroom.image.repository }}:{{ .Values.headroom.image.tag }}"
          imagePullPolicy: {{ .Values.headroom.image.pullPolicy | default "IfNotPresent" }}
          command:
            - headroom
            - proxy
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.headroom.service.port }}"
            - --no-optimize
          env:
            - name: OPENAI_TARGET_API_URL
              value: {{ .Values.headroom.litellmUrl | quote }}
          envFrom:
            - configMapRef:
                name: openagent-headroom-config
            - secretRef:
                name: openagent-headroom-secrets
          ports:
            - name: http
              containerPort: {{ .Values.headroom.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.headroom.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/nonroot/.headroom
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openagent-headroom-data
        - name: tmp
          emptyDir: {}
{{- end }}

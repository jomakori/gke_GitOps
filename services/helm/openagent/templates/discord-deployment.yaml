{{- if .Values.discord.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openagent-discord
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: discord
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "openagent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: openagent
      app.kubernetes.io/managed-by: {{ .Release.Service }}
      helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
      app.kubernetes.io/component: discord
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "openagent.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/component: discord
    spec:
      serviceAccountName: openagent-discord
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
{{ if .Values.dopplerConfig }}
      imagePullSecrets:
        - name: ghcr-pull-secret
{{ end }}
      containers:
        - name: discord-bot
          image: "{{ .Values.discord.image.repository }}:{{ .Values.discord.image.tag }}"
          imagePullPolicy: {{ .Values.discord.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openagent-discord-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_BOT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openagent-discord-secrets
                  key: DISCORD_BOT_CLIENT_ID
            - name: DISCORD_MENTION_ONLY
              value: {{ .Values.discord.config.mentionOnly | quote }}
            - name: DISCORD_CONVERSATION_MODE
              value: {{ .Values.discord.config.conversationMode | quote }}
            - name: DISCORD_PHASE_UPDATES
              value: {{ .Values.discord.config.phaseUpdates | quote }}
            - name: DISCORD_POLL_UI
              value: {{ .Values.discord.config.pollUI | quote }}
            {{- if .Values.discord.config.channelOnly }}
            - name: DISCORD_CHANNEL_ONLY
              value: {{ .Values.discord.config.channelOnly | quote }}
            {{- end }}
            {{- if .Values.discord.config.startupChannel }}
            - name: DISCORD_STARTUP_CHANNEL
              value: {{ .Values.discord.config.startupChannel | quote }}
            {{- end }}
            {{- if .Values.discord.config.clientId }}
            - name: DISCORD_CLIENT_ID
              value: {{ .Values.discord.config.clientId | quote }}
            {{- end }}
            {{- if .Values.discord.config.dashboardUrl }}
            - name: DASHBOARD_URL
              value: {{ .Values.discord.config.dashboardUrl | quote }}
            {{- end }}
            - name: BOT_VERSION
              value: {{ .Values.discord.image.tag | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BOT_VERSION_CONFIGMAP
              value: {{ .Values.discord.version.configMapName | default "openagent-discord-version" | quote }}
          envFrom:
            - secretRef:
                name: openagent-discord-secrets
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.discord.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.discord.service.port }}
              protocol: TCP
{{- end }}

    ### Adding a Persona

    To add a persona to the ensemble, edit `services/helm/openagent/templates/ensemble-omo-loop-engineering.yaml`:
    1. Add an agentConfig entry under `spec.agentConfigs` with `name`, `displayName`, `model` (LiteLLM model name), `systemPrompt` (inline), and `skills` (SkillPack refs).
    2. If the persona is delegated to, add a relationship edge in `spec.relationships[].agents`.
    3. If supervised, add a supervision edge.
    4. ArgoCD sync — the Sympozium controller reconciles the Ensemble automatically. No Terraform changes needed.

    ### OpenAgent Gotchas

    - **Umbrella chart uses `**charts/**` gitignore exception**: Root `.gitignore` has `**charts/**` which blocks ALL charts directories. The custom `openagent-component` subchart needs `!services/helm/openagent/charts/openagent-component/**` in `.gitignore` to be tracked. Without this, `git status` silently ignores subchart templates — they won't exist on other machines after clone.
    - **`.tgz` files are redundant build artifacts**: `helm dependency update` generates `.tgz` archives in `charts/`. These are NOT needed for `file://` deps — Helm reads the chart directory directly. The `**charts/**` gitignore already excludes them. Delete them after local testing.
    - **GHCR packages are private-by-default for org repos**: The sympozium OCI dependency was removed from `openagent/Chart.yaml` because GHCR org packages require authentication (not supported by Helm OCI deps). The control plane must be installed out-of-band via sympozium CLI in the `sympozium-system` namespace.
    - **Discord bot secrets flow through `envFrom`, not Helm values**: The deployment template uses `envFrom: secretRef: openagent-discord-secrets` — ALL keys from the Doppler `svc_openagent` config become env vars. No Helm `--set` parameters for secrets.
    - **Ensemble and SkillPacks deploy to `sympozium-system`, not `.Release.Namespace`**: The `openagent` chart deploys resources into `openagent` namespace, but the Ensemble and SkillPacks have `namespace: sympozium-system` hardcoded. The Sympozium controller only reconciles resources in its own namespace.
    - **LiteLLM uses file-based routing (no database)**: `litellm_config.yaml` uses `general_settings.database_url: null` → in-memory routing. Model config changes require a LiteLLM pod restart (config reload via ConfigMap mount). Lightweight — acceptable for 14 models.
    - **OpenAgent headroom no longer points to OpenRouter**: `OPENAI_TARGET_API_URL` routes through `http://openagent-litellm.openagent.svc.cluster.local:4000/v1`. All LLM traffic flows through LiteLLM now. OpenRouter is completely bypassed.
    - **Discord bot uses OpenAI-compatible API, not A2A**: The bot directly calls `POST /v1/chat/completions` on the Sisyphus web endpoint. No A2A protocol, no agent reference CRD.
    - **4 separate openagent charts consolidated into 1 umbrella**: `openagent-crds`, `openagent-headroom`, `openagent-litellm`, `openagent-discord` chart directories no longer exist. Everything is in `services/helm/openagent/`. Root README and services/README updated to reflect this.

    ### Claude Proxy (Subscription-Based)

    Custom proxy that routes Claude Pro subscription through an OpenAI-compatible API, deployed as a k8s-native service in the `openagent` namespace.

    **Architecture**:
    ```
    Local Mac (claude auth login)
      → ~/.claude/.credentials.json (OAuth tokens)
        → K8s Secret claude-credentials (manual create, key: .credentials.json)
          → Pod volume mount: /root/.claude/
            → claude-pipe (Bun) wraps claude CLI → OpenAI-compatible :4523
    ```

    **Components**:
    | Resource | Details |
    |----------|---------|
    | Image | `ghcr.io/jomakori/claude-proxy:latest` (Dockerfile: `services/helm/openagent/src/claude-proxy/Dockerfile`) |
    | Base | `oven/bun:latest` + Node.js + `@anthropic-ai/claude-code` + `claude-pipe` |
    | Deployment | 1 replica, sync-wave 2, openagent ns, port 4523 |
    | Service | ClusterIP `claude-proxy:4523` — no public ingress |
    | Secret | `claude-credentials` (Opaque, key: `.credentials.json`) |
    | Access | `kubectl port-forward svc/claude-proxy -n openagent 4523:4523` |
    | Models | `claude-opus-4-6`, `claude-sonnet-4-6`, `claude-haiku-4-5` |
    | Rate limit | ~45 Sonnet requests/5h (Pro subscription) |

    **Credential model**: OAuth-based (NOT API key). Auth once on Mac: `claude auth login --email joe3rdwash@gmail.com` → creates `~/.claude/.credentials.json`. Copy to cluster: `kubectl create secret generic claude-credentials --from-file=.credentials.json=$HOME/.claude/.credentials.json -n openagent`. NOT managed by Doppler — manual secret. Re-auth flow when tokens expire: `claude auth login` on Mac → recreate K8s Secret → restart pod.

    **MODEL_ALIASES patching**: `claude-pipe` only knows canonical model names (`claude-sonnet-4-6`). Deployment startup command uses `sed` to patch `/root/.bun/install/global/node_modules/claude-pipe/src/claude.ts` adding aliases like `"claude-sonnet-4": "claude-sonnet-4-6"`, `"claude-opus-4": "claude-opus-4-6"`. This is fragile — if `claude-pipe` updates, the sed pattern may break.

    **Env vars required**:
    - `HOST=0.0.0.0` — claude-pipe binds `127.0.0.1` by default. Must override for inter-pod connectivity.
    - `CLAUDE_PROXY_API_KEY=claude-proxy-local` — dummy value. Proxy uses credential file, ignores auth. LiteLLM requires this for model config validation only.
    - `CLAUDE_BIN=/usr/local/bin/claude` — set in Dockerfile, path to claude CLI.

    **LiteLLM integration** (values.yaml):
    ```yaml
    - model_name: claude/sonnet-4
      litellm_params:
        model: openai/claude-sonnet-4
        api_key: os.environ/CLAUDE_PROXY_API_KEY
        api_base: http://claude-proxy.openagent.svc.cluster.local:4523/v1
    - model_name: claude/opus-4
      litellm_params:
        model: openai/claude-opus-4
        api_key: os.environ/CLAUDE_PROXY_API_KEY
        api_base: http://claude-proxy.openagent.svc.cluster.local:4523/v1
    ```

    **Ensemble persona reassignment** (4 of 10 personas):
    - sisyphus, atlas, prometheus → `claude/sonnet-4` (capable, balanced cost)
    - oracle → `claude/opus-4` (architecture needs best reasoning)
    - Remaining 6 personas unchanged → continue using deepseek-v4-pro, minimax/M3, etc.

    **Gotcha — credential file is a dotfile, secret key must match**: `claude` CLI expects `.credentials.json` (hidden file). `kubectl create secret --from-file=.credentials.json=$HOME/.claude/.credentials.json` creates the key as `.credentials.json` (dot-prefixed). Mount the volume WITHOUT `items` mapping — the key name already matches the expected path. Using `items: [{key: credentials.json, path: .credentials.json}]` BREAKS because the secret key is `.credentials.json`, not `credentials.json`. Symptoms: `MountVolume.SetUp failed: references non-existent secret key`.

    **Gotcha — proxy binds loopback only**: `claude-pipe` defaults to `HOST=127.0.0.1`. Internal DNS resolves but connections are refused. Fix: set `HOST=0.0.0.0` in deployment env vars.

    ### Helm Dependency Alias Gotcha

    **Critical**: When an umbrella chart passes values to a subchart dependency, the dependency MUST have `alias` set in Chart.yaml for values to route correctly.

    **Problem**: Without alias, values passed under `keyName.*` in umbrella `values.yaml` don't reach the subchart — the subchart looks for them under the dependency name, not the umbrella key. Subchart silently uses its own defaults. Helm template renders but resources get wrong config.

    **Example** (litellm-helm in openagent umbrella):
    ```yaml
    # Chart.yaml — WRONG (values never reach subchart)
    dependencies:
      - name: litellm-helm
        version: 1.92.0
        repository: file://charts/litellm-helm
        condition: litellm.enabled

    # Chart.yaml — CORRECT
    dependencies:
      - name: litellm-helm
        alias: litellm
        version: 1.92.0
        repository: file://charts/litellm-helm
        condition: litellm.enabled
    ```

    **Alias renames resources**: Adding alias changes `.Chart.Name` → `fullname` template output changes → resource names change (e.g., `openagent-litellm` → `openagent-openagent-litellm`). Fix: use `fullnameOverride` (not `nameOverride`) to pin resource names.

    ```yaml
    # values.yaml — WRONG (fullname still changes)
    litellm:
      nameOverride: "openagent-litellm"

    # values.yaml — CORRECT
    litellm:
      fullnameOverride: "openagent-litellm"
    ```

    **Symptoms to watch for**: `helm template` renders, `helm lint` passes, but deployed resources have wrong config (e.g., LiteLLM uses default 2-model list instead of 14). Port-forward works but API calls return 400 or wrong model responses. Root cause: subchart receiving defaults.

    ### Claude Proxy Gotchas

    - **Claude proxy models require BOTH LiteLLM AND ensemble updates**: Two separate changes: (1) `values.yaml` → `litellm.proxy_config.model_list` for LiteLLM routing, (2) `templates/ensemble/omo-loop-engineering.yaml` → `model:` fields for persona assignment. Both must be updated together. LiteLLM restart required after config change (file-based routing, no DB).
    - **Credentials use OAuth, not API keys**: No Doppler entry for claude credentials. Manual secret from `~/.claude/.credentials.json`. Re-auth required when tokens expire (~hours-days depending on usage).
    - **MODEL_ALIASES sed patch is fragile**: The startup command patches claude-pipe source via `sed`. If claude-pipe updates (e.g., `bun install -g claude-pipe@latest`), the sed pattern targeting `MODEL_ALIASES` may fail. Monitor proxy logs after image rebuilds.
    - **4-persona limit protects Pro rate limits**: Only sisyphus, atlas, prometheus, oracle use Claude. Remaining 6 personas use existing providers. Adding more Claude personas risks hitting the ~45 req/5h Pro limit.
    - **Dockerfile node version mismatch**: `@anthropic-ai/claude-code` needs Node >=22 but `oven/bun:latest` provides v20 via apt. Non-blocking — claude-pipe runs fine without claude-code CLI. If direct `claude` CLI commands needed in container, switch base to `node:22`.

    - **ESO-managed secrets are overwritten on sync — never put non-Doppler keys in them**: The `openagent-litellm-secrets` ExternalSecret uses `dataFrom.find.regexp: ".*"` with `creationPolicy: Owner`. Any manually added keys (e.g., `username`, `password`, `masterkey`) are overwritten on next ESO reconcile (every 24h or on trigger). Use DEDICATED secrets for non-Doppler values. Example: `openagent-litellm-masterkey` for the LiteLLM master key, `claude-credentials` for OAuth tokens. In values.yaml, reference these via `masterkeySecretName: "openagent-litellm-masterkey"` and `db.secret.name` + `usernameKey`/`passwordKey` to match Doppler key names.

    - **Alias renames break Service selectors**: When adding `alias` to a Helm dependency, the subchart's `_helpers.tpl` uses `.Chart.Name` for `app.kubernetes.io/name` labels. Old Service selectors won't match new pods → Service has no Endpoints → DNS resolves but connections refused. Fix: update Service selector to match new pod labels, or recreate Service from updated chart. Symptoms: pods Running, health probes pass, but `curl service-name:port` returns `exit code 7` (connection refused).

    - **LiteLLM health probes exhaust Claude subscription rate limits**: LiteLLM's health check probes ALL models in the `model_list` every few seconds. With ~13 unhealthy endpoints (other providers rate-limited/out of credit) plus 2 claude models, each probe cycle makes ~15 API calls. At Pro tier (~45 Sonnet/5h), this exhausts the quota in ~2-3 hours even with zero real traffic. Mitigation: use `router_settings.allowed_fails: 5` and `cooldown_time: 60` in `proxy_config` to reduce probe frequency. Longer-term: patch health check to skip claude models or disable probes for non-critical providers.

    - **`CLAUDE_PROXY_API_KEY` must be in LiteLLM pod env, not just proxy**: The `api_key: os.environ/CLAUDE_PROXY_API_KEY` in LiteLLM's model config requires this env var in the LiteLLM pod — NOT just in the proxy pod. Without it, LiteLLM fails with `AuthenticationError: The api_key client option must be set`. Add to deployment via `kubectl set env` or include in Doppler `svc_openagent`.

    - **DB endpoint double-nesting from StackGres**: StackGres creates services like `{cluster-name}.{namespace}.svc.cluster.local`. If values.yaml has `endpoint: "openagent-pg-openagent-pg.openagent.svc.cluster.local"` (cluster name concatenated twice), the DB connection fails with `P1001: Can't reach database server`. Correct format: `{clusterName}.{namespace}.svc.cluster.local` — e.g., `openagent-pg.openagent.svc.cluster.local`. The values `db.endpoint` must match the SGCluster `metadata.name`, not a derived name.

    - **OAuth tokens expire in hours — use `claude setup-token` for longer-lived tokens**: Standard `claude auth login` tokens expire quickly (hours). `claude setup-token` creates a dedicated long-lived token. For pod-based auth, run `claude setup-token` on Mac, then `kubectl create secret generic claude-credentials --from-file=.credentials.json=$HOME/.claude/.credentials.json -n openagent`. Verify with `curl http://claude-proxy:4523/health`. Re-auth flow: expire → `claude setup-token` on Mac → recreate K8s Secret → `kubectl rollout restart deployment/claude-proxy`.

    ## Critical Gotchas

    - **`filter_chain_not_found`** = SNI mismatch. Fix: `match_sni_to_host = true` on tunnel origin_request. The parameter name has an `i` — `match_sni_to_host` (Server Name Indication). Typo `match_sn_ito_host` (missing `i`) silently fails — Terraform removes the unknown key but never adds the correct one.
    - **ExternalSecret pattern — zero explicit `data` mappings**: All ExternalSecrets use `dataFrom.find.regexp: ".*"` + `creationPolicy: Owner`. Doppler keys match exactly what the consuming deployment expects. No explicit `data` mappings in new charts. Legacy exception: postgres-operator maps `ADMIN_USER`→`k8sUsername`.
    - **Postgres-operator ExternalSecret ownership**: Set `authentication.createAdminSecret: false` but do NOT set `authentication.secretRef`. Adding `secretRef.name` causes SGConfig to set `ownerReferences` on the target secret, conflicting with ESO's `creationPolicy: Owner`. Without `secretRef`, SGConfig leaves the ExternalSecret-owned secret alone.
    - **Storage class is `local-path` only**: `storageClass: "local-path"` in `services/argocd-appset/values.yaml` as the global default. Longhorn was removed — it failed on OrbStack (no iSCSI kernel support, v2 requires hugepages). OpenEBS LVM was tested and failed (k3s CSI node registration bug). The sole provider is `local-path` (rancher.io/local-path). All charts reference this via `.Values.storageClass` — never hardcode `longhorn`.
    - **ExternalDNS uses `upsert-only` policy** — never deletes DNS records. Manual cleanup for stale entries.
    - **Cloudflare token** needs `Cloudflare Tunnel:Edit` account-level permission for tunnel creation.
    - **ArgoCD sync stuck**: `kubectl -n argocd patch application services --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'`
    - **Helm/kubernetes providers** use `~/.kube/config` — Terraform must run from machine with k3d context (OrbStack).
    - **`TAILSCALE_HOST`** is typed `any` in variables.tf — be aware, defaults to no type validation.
    - **Volume expansion NOT supported on `local-path`**: The rancher.io/local-path provisioner does NOT support volume expansion. To resize a PVC, create a new larger PVC and manually copy data. This is a known limitation of the default k3s local-path provisioner. Longhorn (which supported expansion) was removed after failing on OrbStack.
    - **onedev SGCluster sync wave**: `SGPostgresConfig`/`SGPoolingConfig` at wave 0, `SGCluster` at wave 1 (so configs exist before reference). The `postgresVersion` must be a numeric string (e.g. `"18"`), not `"latest"` — StackGres webhook rejects non-numeric.
    - **postgres-operator `skipCrds: true`**: CRDs are installed via `INSTALL_CRDS=true` env var, not Helm — prevents ArgoCD normalization errors on CRDs. Set in appset `syncOptions` and Helm chart values.
    - **`enable_public` and `enable_private` are mutually exclusive**: The `applications.yaml` template has a `fail` guard — both flags on the same service stops rendering with a clear error message.
    - **AuthorizationPolicy ZtunnelAccepted warning**: When creating a policy with HTTP attributes (`hosts`, `notRequestPrincipals`), Istio warns `"ztunnel does not support HTTP attributes"`. This is informational — the ingress gateway uses Envoy which handles L7 correctly. The ztunnel warning only affects mesh-internal traffic management.
    - **CF Access Send JWT in `Cf-Access-Jwt-Assertion` header**: Istio's RequestAuthentication defaults to extracting JWT from `Authorization: Bearer`. But Cloudflare Access sends the JWT in the `Cf-Access-Jwt-Assertion` HTTP header. You MUST add `fromHeaders: [{name: Cf-Access-Jwt-Assertion}]` to the `jwtRules`. Without this, Istio never sees the JWT → no `requestPrincipal` set → `notRequestPrincipals: ["*"]` DENY matches → **RBAC: access denied** even after successful Google OAuth login.
    - **CF Access AUD is not secret**: The AUD tag is embedded in every JWT and visible to users. Safe to commit to `values.yaml` or pass via Terraform Helm params. However, it is stored as `sensitive = true` in Terraform and in Doppler as `CF_ACCESS_AUD` for consistency.
    - **VPA requires CRDs**: VPA must be installed at wave 0 before services can create VPA resources at later waves.
    - **GHCR credential ExternalSecret blocks initial ArgoCD sync**: The `services/argocd-appset/templates/ghcr-repo-credential.yaml` renders an ExternalSecret directly in the root `services` Application. When this resource is rendered before the `external-secrets` Application (wave 1) installs the ExternalSecret CRD, the Kubernetes API returns `no matches for kind "ExternalSecret"` and ArgoCD fails the entire sync — **no child Applications are created**. Fix: the template is gated on `{{`{{ if .Values.kagentUpstream.enable }}`}}`. Set `kagentUpstream.enable: false` for initial cluster bootstrap, then re-enable after external-secrets is Healthy. Without this gate, the cluster cannot bootstrap from scratch.
    - **Helm dependency `alias` silently breaks Service selectors**: Adding `alias` to a Chart.yaml dependency changes the subchart's `.Chart.Name`, which in turn changes `app.kubernetes.io/name` labels on pods. Existing Services (created by pre-alias chart) have selectors matching OLD labels → Endpoints go to `<none>` → DNS resolves but connections are refused with `exit code 7`. Fix: either delete and recreate the Service from the updated chart, or patch the Service selector to match new pod labels. Always check `kubectl get endpoints` after alias changes. Also affects Ingress/VirtualService backends that reference the service.
    - **Longhorn was removed — do not re-enable**: Longhorn v1 failed because OrbStack lacks kernel iSCSI support (`iscsi_tcp` module not loaded). Longhorn v2 (1.12.0) failed because it unconditionally mounts a `HugePages` EmptyDir for v2 instance-manager pods, and OrbStack kernel lacks `CONFIG_HUGETLBFS`. OpenEBS LVM was tested as an alternative but failed because k3s v1.35.1 kubelet never registers CSI drivers from node-driver-registrar (`driver name not found in registered CSI drivers`). The only working storage is `local-path`.
    - **CoreDNS Google DNS causes Go resolver "server misbehaving"**: k3d's pod network can't reliably forward UDP to `8.8.8.8` through Docker bridge networking. Go's pure-Go DNS resolver (used by external-secrets operator) reports `server misbehaving` on truncated/timeout responses. Fix: forward to the k3d node's own DNS resolver (`192.168.97.1` — Docker bridge gateway) via dynamic `data.external.k3d_dns` in Terraform. Without this, all 10 ClusterSecretStores fail with `InvalidProviderConfig` → no ExternalSecrets sync → cascading failures.
    - **ArgoCD sync wave ordering won't prevent CRD-not-found failures in the services ApplicationSet**: The root `services` Application contains BOTH Application resources (deployed as sub-apps at their respective waves) AND raw resources like the GHCR credential ExternalSecret. Raw resources are applied during the root app's sync, regardless of child app sync waves. If a raw resource references a CRD installed by a child app at a later wave, the root sync fails before any child apps are created.



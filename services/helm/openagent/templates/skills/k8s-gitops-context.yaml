    ### SkillPacks (sympozium.ai/v1alpha1)

    Three SkillPacks deployed alongside the Ensemble in `sympozium-system`:
    - **`omo-core-skills`** — `caveman` (ultra-compressed communication) + `ponytail` (YAGNI ladder)
    - **`hashline-editor`** — MCP-based editing tool
    - **`k8s-ops`** — kubectl + helm operations


{{- if .Values.discord.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openagent-discord-version-tracker
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: discord
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ .Values.discord.version.configMapName | default "openagent-discord-version" }}"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openagent-discord-version-tracker
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: discord
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openagent-discord-version-tracker
subjects:
  - kind: ServiceAccount
    name: openagent-discord
    namespace: {{ .Values.namespace }}
{{- end }}

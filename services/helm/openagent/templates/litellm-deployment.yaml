{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openagent-litellm
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "openagent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: openagent
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: litellm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "openagent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: openagent
      app.kubernetes.io/managed-by: {{ .Release.Service }}
      helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
      app.kubernetes.io/component: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "openagent.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/component: litellm
    spec:
      serviceAccountName: openagent-litellm
{{ if .Values.dopplerConfig }}
      imagePullSecrets:
        - name: ghcr-pull-secret
{{ end }}
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --config
            - /etc/litellm/litellm_config.yaml
            - --port
            - "{{ .Values.litellm.service.port }}"
            - --num_workers
            - "1"
          env:
            {{- if .Values.litellm.databaseUrl }}
            - name: DATABASE_URL
              value: {{ .Values.litellm.databaseUrl | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: openagent-litellm-secrets
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: proxy
              containerPort: {{ .Values.litellm.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: proxy
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: openagent-litellm-config
        - name: tmp
          emptyDir: {}
{{- end }}

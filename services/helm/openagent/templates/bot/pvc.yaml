apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openagent-discord-state
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: discord-bot
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi
  storageClassName: {{ .Values.storageClass }}

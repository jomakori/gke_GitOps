apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: require-cf-access-dashboard
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: DENY
  rules:
    - from:
        - source:
            notRequestPrincipals: ["*"]
      to:
        - operation:
            hosts:
              - {{ include "openagent.dashboardURL" . | quote }}

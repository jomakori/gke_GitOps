{{- if and .Values.headroom.enabled .Values.dopplerConfig }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openagent-headroom-secrets
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 24h
  target:
    name: openagent-headroom-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: ".*"
{{- end }}

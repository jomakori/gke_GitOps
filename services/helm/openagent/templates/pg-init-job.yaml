{{- if .Values.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: openagent-pg-init
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/component: postgres-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:18-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: openagent-pg-credentials
                  key: postgres-password
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: openagent-pg-credentials
                  key: postgres-user
            - name: PGDATABASE
              value: litellm
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h openagent-pg.openagent.svc.cluster.local -p 5432 -U "$PGUSER"; do
                sleep 5
              done
              echo "PostgreSQL is ready. Ensuring user and database exist..."
              psql -h openagent-pg.openagent.svc.cluster.local -U "$PGUSER" -c "SELECT 'CREATE DATABASE litellm' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'litellm')\gexec"
              echo "Done."
{{- end }}

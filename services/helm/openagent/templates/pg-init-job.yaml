{{- if .Values.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: openagent-pg-init
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: openagent
        app.kubernetes.io/component: postgres-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:18-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h openagent-pg.openagent.svc.cluster.local -p 5432 -U postgres 2>/dev/null; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."
              SUPERUSER_PASS=$(cat /etc/doppler-creds/POSTGRES_SUPERUSER_PASSWORD)
              echo "Ensuring openagent user exists with correct password..."
              PGPASSWORD="$SUPERUSER_PASS" psql -h openagent-pg.openagent.svc.cluster.local -U postgres -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'openagent') THEN CREATE ROLE openagent WITH LOGIN SUPERUSER PASSWORD '$SUPERUSER_PASS'; ELSE ALTER ROLE openagent WITH LOGIN SUPERUSER PASSWORD '$SUPERUSER_PASS'; END IF; END \$\$;"
              echo "openagent user ready."
              echo "Ensuring litellm database exists..."
              PGPASSWORD="$SUPERUSER_PASS" psql -h openagent-pg.openagent.svc.cluster.local -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='litellm'" | grep -q 1 || PGPASSWORD="$SUPERUSER_PASS" psql -h openagent-pg.openagent.svc.cluster.local -U postgres -c "CREATE DATABASE litellm OWNER openagent"
              echo "litellm database ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: openagent-pg-credentials
                  key: postgres-password
      volumes:
        - name: doppler-creds
          secret:
            secretName: openagent-pg-credentials  # pragma: allowlist secret
{{- end }}

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "openagent.fullname" . }}-dashboard
  namespace: istio-system
  labels:
    {{- include "openagent.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ include "openagent.dashboardURL" . | quote }}
  gateways:
    - istio-system/maklab-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ .Values.dashboard.destination.host | quote }}
            port:
              number: {{ .Values.dashboard.destination.port }}
      timeout: 600s
      retries:
        attempts: 2
        perTryTimeout: 300s
        retryOn: gateway-error,connect-failure,refused-stream
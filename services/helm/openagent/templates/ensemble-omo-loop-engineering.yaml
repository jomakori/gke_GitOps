  # ── Relationships (Delegation + Supervision) ──────────────────────
  relationships:
    # Delegation edges
    - source: sisyphus
      target: prometheus
      type: delegation
    - source: sisyphus
      target: metis
      type: delegation
    - source: sisyphus
      target: hephaestus
      type: delegation
    - source: sisyphus
      target: oracle
      type: delegation
    - source: sisyphus
      target: atlas
      type: delegation
    - source: atlas
      target: librarian
      type: delegation
    - source: atlas
      target: explore
      type: delegation
    - source: atlas
      target: sisyphus-junior
      type: delegation
    - source: prometheus
      target: momus
      type: delegation
    # Supervision edges
    - source: atlas
      target: sisyphus
      type: supervision
    - source: atlas
      target: prometheus
      type: supervision
    - source: atlas
      target: hephaestus
      type: supervision
    # Stimulus edge — stimulus prompt delivered to sisyphus
    - source: omo-loop-engineering
      target: sisyphus

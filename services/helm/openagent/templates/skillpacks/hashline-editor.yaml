apiVersion: sympozium.ai/v1alpha1
kind: SkillPack
metadata:
  name: hashline-editor
  namespace: sympozium-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  category: devops
  skills:
    - name: hashline
      description: "Hashline MCP sidecar for precise file editing — exact string replacement, AST-aware transformations, and structured code modifications."
      content: |
        # Hashline — Precise File Editor

        Hashline provides MCP-based file editing capabilities:
        - Exact string replacement in files
        - AST-aware code transformations
        - Structured code modifications with safety checks

        ## Usage
        Use hashline for all file editing operations.
        Prefer exact string replacement for simple changes.
        Use AST transformations for complex refactoring.

apiVersion: sympozium.ai/v1alpha1
kind: SkillPack
metadata:
  name: k8s-ops
  namespace: sympozium-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  category: kubernetes
  skills:
    - name: kubectl
      description: "Kubernetes CLI operations — apply, delete, get, logs, exec, port-forward, describe resources."
      content: |
        # kubectl — Kubernetes CLI

        ## Available Commands
        - `kubectl apply -f <file>` — Apply resource from file
        - `kubectl delete <resource> <name>` — Delete resource
        - `kubectl get <resource>` — List resources
        - `kubectl logs <pod>` — View pod logs
        - `kubectl exec -it <pod> -- <command>` — Execute command in pod
        - `kubectl port-forward <pod> <local>:<remote>` — Forward port
        - `kubectl describe <resource> <name>` — Describe resource details

        ## Usage
        Use kubectl for all Kubernetes resource operations.
        Prefer `get -o wide` or `get -o yaml` for detailed output.
    - name: helm
      description: "Helm chart operations — install, upgrade, rollback, template, list, diff, dependency management."
      content: |
        # helm — Kubernetes Package Manager

        ## Available Commands
        - `helm install <release> <chart>` — Install a chart
        - `helm upgrade <release> <chart>` — Upgrade a release
        - `helm rollback <release> <revision>` — Rollback to revision
        - `helm template <release> <chart>` — Render templates locally
        - `helm list` — List releases
        - `helm diff upgrade <release> <chart>` — Show diff before upgrade
        - `helm dependency update` — Update chart dependencies

        ## Usage
        Use helm for managing Kubernetes applications via charts.
        Always diff before upgrade in production contexts.

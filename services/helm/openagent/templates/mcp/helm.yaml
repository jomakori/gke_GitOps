apiVersion: sympozium.ai/v1alpha1
kind: MCPServer
metadata:
  name: helm
  namespace: sympozium-system
  labels:
    app.kubernetes.io/part-of: openagent
    sympozium.ai/catalog: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  transportType: http
  toolsPrefix: helm
  timeout: 60
  replicas: 1
  deployment:
    image: talkopsai/helm-mcp-server:latest
    port: 8765
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

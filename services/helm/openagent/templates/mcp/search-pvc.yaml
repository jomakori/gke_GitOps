apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: search-repos
  namespace: sympozium-system
  labels:
    app.kubernetes.io/part-of: openagent
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path

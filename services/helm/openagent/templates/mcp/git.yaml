apiVersion: sympozium.ai/v1alpha1
kind: MCPServer
metadata:
  name: git
  namespace: sympozium-system
  labels:
    app.kubernetes.io/part-of: openagent
    sympozium.ai/catalog: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  transportType: stdio
  toolsPrefix: git
  timeout: 30
  replicas: 1
  deployment:
    image: node:23-alpine
    cmd: npx
    args:
    - "-y"
    - "@cyanheads/git-mcp-server@latest"
    env:
      GIT_USERNAME: openagent
      GIT_EMAIL: openagent@maklab.net

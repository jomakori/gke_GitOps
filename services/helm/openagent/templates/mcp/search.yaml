apiVersion: sympozium.ai/v1alpha1
kind: MCPServer
metadata:
  name: search
  namespace: sympozium-system
  labels:
    app.kubernetes.io/part-of: openagent
    sympozium.ai/catalog: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  transportType: stdio
  toolsPrefix: search
  timeout: 15
  replicas: 1
  deployment:
    image: ghcr.io/jomakori/gke_gitops/search-mcp:1.0.0
    cmd: npx
    args:
    - "-y"
    - "mcp-ripgrep"
    - "--allow-dir"
    - "/data"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

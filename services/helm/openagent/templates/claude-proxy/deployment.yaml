{{- if .Values.claudeProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-proxy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: claude-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openagent.labels" . | nindent 6 }}
      app.kubernetes.io/component: claude-proxy
  template:
    metadata:
      labels:
        {{- include "openagent.labels" . | nindent 8 }}
        app.kubernetes.io/component: claude-proxy
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
      initContainers:
        - name: refresh-token
          image: "{{ .Values.claudeProxy.image.repository }}:{{ .Values.claudeProxy.image.tag }}"
          imagePullPolicy: {{ .Values.claudeProxy.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              cp /secrets/.credentials.json /writable/.credentials.json && \
              python3 -c "
              import json, time, urllib.request, os

              CREDS_FILE = '/writable/.credentials.json'
              TOKEN_URL = 'https://platform.claude.com/v1/oauth/token'
              CLIENT_ID = '9d1c250a-e61b-44d9-88ed-5944d1962f5e'

              if not os.path.exists(CREDS_FILE):
                  print('No credentials file, skipping refresh')
                  exit(0)

              with open(CREDS_FILE) as f:
                  creds = json.load(f)
              oauth = creds.get('claudeAiOauth', {})
              refresh_token = oauth.get('refreshToken', '')
              expires_at = oauth.get('expiresAt', 0)
              now_ms = int(time.time() * 1000)

              if not refresh_token:
                  print('No refresh token, skipping')
                  exit(0)

              ttl_h = (expires_at - now_ms) / 1000 / 3600
              print(f'Token TTL: {ttl_h:.1f}h')

              if ttl_h > 1:
                  print('Token fresh, skipping refresh')
                  exit(0)

              print('Refreshing OAuth token...')
              body = json.dumps({
                  'grant_type': 'refresh_token',
                  'refresh_token': refresh_token,
                  'client_id': CLIENT_ID,
              }).encode()

              req = urllib.request.Request(TOKEN_URL, data=body, method='POST')
              req.add_header('Content-Type', 'application/json')
              req.add_header('Accept', 'application/json')
              req.add_header('User-Agent', 'claude-cli/2.1.207 (external, cli)')

              try:
                  resp = urllib.request.urlopen(req, timeout=15)
                  data = json.loads(resp.read())
                  new_access = data.get('access_token', '')
                  new_refresh = data.get('refresh_token', refresh_token)
                  expires_in = data.get('expires_in', 3600)

                  if new_access:
                      new_expires = int(time.time() * 1000) + (expires_in * 1000)
                      oauth['accessToken'] = new_access
                      oauth['refreshToken'] = new_refresh
                      oauth['expiresAt'] = new_expires
                      creds['claudeAiOauth'] = oauth
                      with open(CREDS_FILE, 'w') as f:
                          json.dump(creds, f)
                      print(f'Token refreshed. New TTL: {expires_in/3600:.1f}h')
                  else:
                      print('Refresh response missing access_token')
              except Exception as e:
                  print(f'Refresh failed: {e}')
              " && \
              echo "Token refresh init complete"
          volumeMounts:
            - name: claude-credentials-secret
              mountPath: /secrets
              readOnly: true
            - name: claude-credentials-writable
              mountPath: /writable
      containers:
        - name: claude-proxy
          image: "{{ .Values.claudeProxy.image.repository }}:{{ .Values.claudeProxy.image.tag }}"
          imagePullPolicy: {{ .Values.claudeProxy.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              sed -i '/^const MODEL_ALIASES/,/^};/c\
              const MODEL_ALIASES: Record<string, string> = {\
                sonnet: \"claude-sonnet-4-6\",\
                opus: \"claude-opus-4-6\",\
                haiku: \"claude-haiku-4-5\",\
                \"sonnet-4.6\": \"claude-sonnet-4-6\",\
                \"sonnet-4.5\": \"claude-sonnet-4-5\",\
                \"opus-4.6\": \"claude-opus-4-6\",\
                \"opus-4.5\": \"claude-opus-4-5\",\
                \"opus-4.1\": \"claude-opus-4-1\",\
                \"claude-sonnet-4\": \"claude-sonnet-4-6\",\
                \"claude-opus-4\": \"claude-opus-4-6\",\
                \"claude-haiku-4\": \"claude-haiku-4-5\",\
                \"gpt-4\": \"claude-sonnet-4-6\",\
                \"gpt-4o\": \"claude-sonnet-4-6\",\
                \"gpt-4o-mini\": \"claude-haiku-4-5\",\
              };' /root/.bun/install/global/node_modules/claude-pipe/src/claude.ts && \
              exec /usr/local/bin/bun /usr/local/bin/claude-pipe
          ports:
            - containerPort: {{ .Values.claudeProxy.service.port }}
              name: http
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: CLAUDE_PROXY_API_KEY
              value: "claude-proxy-local"
          resources:
            {{- toYaml .Values.claudeProxy.resources | nindent 12 }}
          volumeMounts:
            - name: claude-credentials-writable
              mountPath: /root/.claude
      volumes:
        - name: claude-credentials-secret
          secret:
            secretName: claude-credentials
        - name: claude-credentials-writable
          emptyDir: {}
{{- end }}

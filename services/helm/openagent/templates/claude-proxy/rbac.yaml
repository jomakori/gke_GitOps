{{- if .Values.claudeProxy.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-proxy-restarter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-proxy-restarter
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["claude-proxy"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-proxy-restarter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-proxy-restarter
subjects:
  - kind: ServiceAccount
    name: claude-proxy-restarter
{{- end }}

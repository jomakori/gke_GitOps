{{- if .Values.dopplerConfig }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kagent-headroom.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-{{ .Values.dopplerConfig | replace "_" "-" }}
  refreshInterval: 1m
  target:
    name: kagent-headroom-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: ".*"
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: OPENAI_API_KEY
{{- end }}

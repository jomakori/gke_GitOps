dopplerConfig: "svc_mongodb"

# Official MongoDB image (multi-arch: amd64 + arm64)
image:
  registry: docker.io
  repository: mongo
  tag: "8.3.1"

# Authentication — single user is created as root
auth:
  username: ""
  password: ""
  database: ""

# Service
service:
  port: 27017

# Persistent storage
persistence:
  enabled: true
  storageClass: ""
  size: "10Gi"

# Resource limits
resources:
  requests:
    cpu: "256m"
    memory: "512Mi"

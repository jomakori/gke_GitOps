name: opencost
source:
  repoURL: https://github.com/jomakori/gke_GitOps
  path: services/helm/opencost
  targetRevision: main
  helm:
    values: |
      opencost:
        networkPolicies:
          prometheus:
            namespace: kube-prometheus-stack
            port: 9090
            labels:
              app.kubernetes.io/name: prometheus
        exporter:
          defaultClusterId: null
          extraEnv:
            EMIT_KSM_V1_METRICS: "false"
            EMIT_KSM_V1_METRICS_ONLY: "true"
            LOG_LEVEL: warn
        prometheus:
          internal:
            enabled: true
            serviceName: kube-prometheus-stack-prometheus
            namespaceName: kube-prometheus-stack
        ui:
          enabled: true
        metrics:
          serviceMonitor:
            enabled: false
        nodeSelector:
          intent: apps
destination:
  server: https://kubernetes.default.svc
  namespace: opencost
syncWave: 0

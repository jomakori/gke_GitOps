# Creates ArgoCD repository credential for ghcr.io kagent Helm chart.
# Requires doppler-svc-kagent ClusterSecretStore to exist (wave 1, external-secrets).
# The kagent-upstream Application (sync-wave: 6) will use this credential to pull the OCI chart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-ghcr-kagent
  namespace: {{ .Values.argoNamespace | default "argocd" }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-svc-kagent
  refreshInterval: 1m
  target:
    name: repo-ghcr-kagent
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        url: oci://ghcr.io/kagent-dev/kagent/helm
        username: jomakori
        password: "{{ .GITHUB_TOKEN }}"
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: GITHUB_TOKEN

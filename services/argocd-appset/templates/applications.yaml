{{- range $key, $cfg := .Values.services }}
{{- if $cfg.enable }}
{{- if $cfg.environments }}
{{- range $env := $cfg.environments }}
---
{{ include "argocd.application.multi" (dict "key" $key "config" $cfg "env" $env "root" $) }}
{{- end }}
{{- else if eq $key "istio" }}
{{- /* istio aggregates gateways.enable_public from all services
        and injects VirtualService params as Helm --set into the umbrella chart.
        Derives routing params by convention:
           host     = {subdomain}.{clusterDomain}
           dest     = {serviceName}.{destNamespace}.svc.cluster.local:{servicePort}
           VS name  = {subdomain}
*/}}
{{- $gatewayParams := list }}
{{- range $sk, $sv := $.Values.services }}
{{- if and $sv.enable $sv.gateways $sv.gateways.enable_public }}
{{-   $svName := $sv.name | default (lower (regexReplaceAll "([a-z])([A-Z])" $sk "${1}-${2}" | lower)) }}
{{-   $subdomain := $sv.gateways.subdomain | default $svName }}
{{-   $destCfg  := $sv.gateways.destination | default dict }}
{{-   $destSvc  := $destCfg.serviceName | default $svName }}
{{-   $destPort := $destCfg.servicePort | default 80 | toString }}
{{-   $destNs  := $sv.destNamespace | default $svName }}
{{-   $host     := printf "%s.%s" $subdomain $.Values.clusterDomain }}
{{-   $destHost := printf "%s.%s.svc.cluster.local" $destSvc $destNs }}
{{-   $vsKey    := $subdomain }}
{{-   $gatewayParams = append $gatewayParams (dict "name" (printf "virtualServices.%s.enabled" $vsKey) "value" "true") }}
{{-   $gatewayParams = append $gatewayParams (dict "name" (printf "virtualServices.%s.host" $vsKey) "value" $host) }}
{{-   $gatewayParams = append $gatewayParams (dict "name" (printf "virtualServices.%s.destination.host" $vsKey) "value" $destHost) }}
{{-   $gatewayParams = append $gatewayParams (dict "name" (printf "virtualServices.%s.destination.port" $vsKey) "value" $destPort) }}
{{- end }}
{{- end }}
{{- $mergedParams := concat ($cfg.parameters | default list) $gatewayParams }}
{{- $umbrella := mustMergeOverwrite (deepCopy $cfg) (dict "parameters" $mergedParams) }}
---
{{ include "argocd.application" (dict "key" $key "config" $umbrella "root" $) }}
{{- else }}
---
{{ include "argocd.application" (dict "key" $key "config" $cfg "root" $) }}
{{- end }}
{{- end }}
{{- end }}

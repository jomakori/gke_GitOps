{{- if .Values.kagentUpstream.enable }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-upstream
  namespace: {{ .Values.argoNamespace | default "argocd" }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: {{ .Values.argoProject | default "default" }}
  source:
    repoURL: oci://ghcr.io/kagent-dev/kagent/helm/kagent
    targetRevision: 0.9.10
    path: "."
    helm:
      values: |
        fullnameOverride: "kagent"
        registry: ghcr.io
        imagePullSecrets: []
        imagePullPolicy: IfNotPresent

        # Agent harnesses bundled in the OCI chart. Enable ones matching our stack.
        grafana-mcp:
          enabled: true
        querydoc:
          enabled: false
        k8s-agent:
          enabled: true
        kgateway-agent:
          enabled: false
        istio-agent:
          enabled: true
        promql-agent:
          enabled: true
        observability-agent:
          enabled: true
        argo-rollouts-agent:
          enabled: false
        helm-agent:
          enabled: true
        cilium-policy-agent:
          enabled: false
        cilium-manager-agent:
          enabled: false
        cilium-debug-agent:
          enabled: false
        oauth2-proxy:
          enabled: false

        # Enable OCI-dependency subcharts
        kmcp:
          enabled: true
        kagent-tools:
          enabled: true

        # Disable bundled Postgres — we use StackGres
        substrate:
          enabled: false

        database:
          postgres:
            bundled:
              enabled: false
            url: ""
            urlFile: "/var/run/secrets/kagent-db/database-url"
            vectorEnabled: false

        controller:
          replicas: 1
          loglevel: info
          auth:
            mode: unsecure
          agentDeployment:
            host: "0.0.0.0"
          substrate:
            enabled: true
            ateApiEndpoint: "dns:///kagent-substrate-api.ate-system.svc:443"
            ateApiInsecure: true
            defaultWorkerPool:
              namespace: kagent
              name: kagent-default
          service:
            type: ClusterIP
            ports:
              port: 8083
              targetPort: 8083
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 2
              memory: 512Mi
          volumes:
            - name: kagent-db
              secret:
                secretName: kagent-pg-app
          volumeMounts:
            - name: kagent-db
              mountPath: /var/run/secrets/kagent-db
              readOnly: true

        substrateWorkerPool:
          create: true
          name: kagent-default
          replicas: 5
          ateomImage: "ghcr.io/kagent-dev/substrate/ateom-gvisor:v0.0.6"

        ui:
          service:
            type: ClusterIP
            ports:
              port: 8080
              targetPort: 8080

        providers:
          default: openAI
          openAI:
            provider: OpenAI
            model: "opencode/big-pickle"
            apiKeySecretRef: kagent-secrets
            apiKeySecretKey: OPENAI_API_KEY
  destination:
    server: {{ .Values.clusterServer | default "https://kubernetes.default.svc" }}
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Validate=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}

name: external-secrets
source:
  repoURL: https://github.com/jomakori/gke_GitOps
  path: services/helm/external-secrets
  targetRevision: main
  helm:
    values: |
      installCRDs: true
      replicaCount: 2
      serviceAccount:
        create: true
destination:
  server: https://kubernetes.default.svc
  namespace: external-secrets
syncWave: 1

# Global Values - shared values - passed in via DevOps repo (Terraform)
argoNamespace: ""
argoProject: ""
clusterDomain: ""
clusterName: ""
clusterServer: ""
repoUrl: ""
storageClass: "local-path"
targetRevision: ""
accessTeamDomain: ""
accessAudienceTag: ""

# Service Configurations
services:
  # Wave 0 — Init services (no deps)
  localPath:
    enable: true
    syncWave: "0"
    syncOptions:
      - CreateNamespace=true

  certManager:
    enable: true
    syncWave: "0"
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  metricsServer:
    enable: true
    syncWave: "0"
    destNamespace: kube-system
    finalizer: true

    syncOptions:
      - Replace=true

  vpa:
    enable: true
    syncWave: "0"
    destNamespace: vpa
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  openagentCrds:
    enable: true
    syncWave: "0"
    destNamespace: openagent
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true

  # Wave 1 — Secret engine
  externalSecrets:
    enable: true
    syncWave: "1"
    finalizer: true

    retryLimit: 5
    retryMaxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        name: external-secrets-webhook
        namespace: external-secrets
        jsonPointers:
          - /data
          - /type

  # Wave 1 — OpenAgent services (after external-secrets ClusterSecretStores are ready)
  openagentHeadroom:
    enable: true
    syncWave: "1"
    destNamespace: openagent
    dopplerConfig: "svc_openagent"
    parameters:
      - name: storageClass
        value: "{{ .Values.storageClass }}"
    syncOptions:
      - CreateNamespace=true

  litellmOpenagent:
    enable: true
    syncWave: "1"
    destNamespace: openagent
    helmPath: services/helm/openagent-litellm
    dopplerConfig: "svc_openagent"
    syncOptions:
      - CreateNamespace=true

  # Wave 2 — Istio umbrella (after external-secrets ClusterSecretStores are ready)
  istio:
    enable: true
    syncWave: "2"
    destNamespace: istio-system
    dopplerConfig: "svc_cloudflare"
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.dataFrom[].find.conversionStrategy
          - .spec.dataFrom[].find.decodingStrategy
          - .spec.dataFrom[].find.nullBytePolicy
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
          - .webhooks[].failurePolicy
          - .webhooks[].matchPolicy
          - .webhooks[].namespaceSelector
          - .webhooks[].objectSelector
          - .webhooks[].timeoutSeconds
          - .webhooks[].clientConfig.service.port
          - .webhooks[].rules[].scope
    parameters:
      - name: virtualServices.argocd.enabled
        value: "true"
      - name: virtualServices.argocd.host
        value: argocd.maklab.net
      - name: virtualServices.argocd.destination.host
        value: argo-cd-argocd-server.argocd.svc.cluster.local
      - name: virtualServices.argocd.destination.port
        value: "80"

  openagent:
    enable: true
    syncWave: "2"
    destNamespace: openagent
    dopplerConfig: "svc_openagent"
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
    gateways:
      enable_private: true
      subdomain: openagent
      timeout: 600s
      destination:
        serviceName: openagent-api
        servicePort: 8080
    parameters:
      - name: storageClass
        value: "{{ .Values.storageClass }}"
      - name: clusterDomain
        value: "{{ .Values.clusterDomain }}"
    syncOptions:
      - CreateNamespace=true

  # Wave 3 — Edge infrastructure (after istio for backend routing)
  cloudflareTunnel:
    enable: true
    syncWave: "3"
    dopplerConfig: "svc_cloudflare"

  kagentSubstrate:
    enable: false
    syncWave: "3"
    destNamespace: ate-system
    selfHeal: false
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
    parameters:
      - name: storageClass
        value: "{{ .Values.storageClass }}"
      - name: auth.jwt.audience
        value: "kagent-substrate-api.ate-system.svc"
      - name: bootstrap.enabled
        value: "true"

  # Wave 4 — Operators (no endpoint deps)
  externalDns:
    enable: true
    syncWave: "4"
    dopplerConfig: "svc_cloudflare"

  kagentHeadroom:
    enable: false
    syncWave: "4"
    destNamespace: kagent
    dopplerConfig: "svc_kagent"
    parameters:
      - name: storageClass
        value: "{{ .Values.storageClass }}"
    syncOptions:
      - CreateNamespace=true

  litellm:
    enable: false
    syncWave: "4"
    destNamespace: kagent
    dopplerConfig: "svc_kagent"
    syncOptions:
      - CreateNamespace=true

  keda:
    enable: false
    syncWave: "4"
    argocdNamespace: argocd
    finalizer: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  mongodbOperator:
    enable: false
    syncWave: "4"
    argocdNamespace: argocd
    argoProject: default

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retryLimit: 2
    retryMaxDuration: 3m
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/respect-existing: "true"
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jqPathExpressions:
          - .

  postgresOperator:
    enable: true
    syncWave: "4"
    argocdNamespace: argocd
    argoProject: default
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
    retryLimit: 2
    retryMaxDuration: 3m
    skipCrds: true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/respect-existing: "true"
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jqPathExpressions:
          - .
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.data[].remoteRef.conversionStrategy
          - .spec.data[].remoteRef.decodingStrategy
          - .spec.data[].remoteRef.metadataPolicy
          - .spec.data[].remoteRef.nullBytePolicy
    dopplerConfig: "svc_postgres_operator"

  # Wave 5 — General services
  kagent:
    enable: false
    syncWave: "5"
    destNamespace: kagent
    dopplerConfig: "svc_kagent"
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
    gateways:
      enable_private: true
      subdomain: kagent
      timeout: 600s
      destination:
        serviceName: kagent-ui
        servicePort: 8080
    parameters:
      - name: storageClass
        value: "{{ .Values.storageClass }}"
      - name: clusterDomain
        value: "{{ .Values.clusterDomain }}"
    syncOptions:
      - CreateNamespace=true
    ignoreDifferences:
      - group: stackgres.io
        kind: SGPostgresConfig
        name: kagent-pg-config
        jqPathExpressions:
          - '.spec."postgresql.conf"'

  kubePrometheusStack:
    enable: true
    dopplerConfig: "svc_grafana"
    finalizer: true
    syncWave: "5"
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    ignoreDifferences:
      - group: apps
        kind: DaemonSet
        name: kube-prometheus-stack-prometheus-node-exporter
        namespace: kube-prometheus-stack
        jsonPointers:
          - /spec/template/spec/containers/0/resources
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.dataFrom[].find.conversionStrategy
          - .spec.dataFrom[].find.decodingStrategy
          - .spec.dataFrom[].find.nullBytePolicy
    gateways:
      enable_public: true
      subdomain: grafana
      destination:
        serviceName: kube-prometheus-stack-grafana


  onedev:
    enable: true
    syncWave: "5"
    gateways:
      enable_public: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        name: onedev-secrets
        namespace: onedev
        jsonPointers:
          - /data
      - group: stackgres.io
        kind: SGPostgresConfig
        name: onedev-pg-config
        jqPathExpressions:
          - .spec."postgresql.conf"
      - group: stackgres.io
        kind: SGPoolingConfig
        name: onedev-pg-pooling
        jqPathExpressions:
          - .spec.pgBouncer."pgbouncer.ini".pgbouncer
    parameters:
      - name: storageClass
        value: "{{ .Values.storageClass }}"

  redisOperator:
    enable: false
    syncWave: "5"
    finalizer: true
    environments:
      - production
      - staging
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
    parameters:
      - name: redis-cluster.persistence.storageClass
        value: "{{ .Values.storageClass }}"

  kagentDiscord:
    enable: false
    syncWave: "7"
    destNamespace: kagent
    dopplerConfig: "svc_kagent"
    syncOptions:
      - CreateNamespace=true

  openagentDiscord:
    enable: true
    syncWave: "3"
    destNamespace: openagent
    dopplerConfig: "svc_openagent"
    parameters:
      - name: config.agentRef
        value: "omo-loop-engineering-sisyphus"
      - name: config.agentId
        value: "stimulus-omo-loop-engineering"
      - name: config.agentModel
        value: "deepseek-v4-flash"
      - name: config.agentModelProvider
        value: "deepseek"
      - name: config.agentNamespace
        value: "sympozium-system"
      - name: config.agentSkills
        value: "k8s-ops,omo-core-skills,hashline-editor,memory"
    syncOptions:
      - CreateNamespace=true

# Deploy upstream kagent controller + UI from OCI chart (after local kagent chart creates DB, CRDs, secrets)
kagentUpstream:
  # Uses native-OCI shape (path: "." instead of chart field) to work around
  # ArgoCD v3.4.x OCI Helm bug where chart name is not appended to URL.
  # See https://github.com/argoproj/argo-cd/pull/1051 for the fix approach.
  enable: false

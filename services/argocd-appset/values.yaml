# Global Values - shared values - passed in via DevOps repo (Terraform)
argoNamespace: ""
argoProject: ""
clusterDomain: ""
clusterName: ""
clusterServer: ""
repoUrl: ""
storageClass:
targetRevision: ""

# Service Configurations
services:
  # Wave 0 — no deps
  certManager:
    enable: true
    name: cert-manager
    syncWave: "0"
    helmPath: services/helm/cert-manager
    destNamespace: cert-manager
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  genericDevicePlugin:
    enable: true
    name: generic-device-plugin
    syncWave: "0"
    helmPath: services/helm/generic-device-plugin
    destNamespace: kube-system
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  metricsServer:
    enable: true
    name: metrics-server
    syncWave: "0"
    helmPath: services/helm/metrics-server
    destNamespace: kube-system
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - Replace=true

  # Wave 1 — Secret engine
  externalSecrets:
    enable: true
    name: external-secrets
    syncWave: "1"
    helmPath: services/helm/external-secrets
    destNamespace: external-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    retryLimit: 5
    retryMaxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  # Wave 2 — Istio umbrella (after external-secrets ClusterSecretStores are ready)
  istio:
    enable: true
    name: istio
    syncWave: "2"
    helmPath: services/helm/istio
    destNamespace: istio-system
    selfHeal: true
    dopplerConfig: "svc_cloudflare"
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.dataFrom[].find.conversionStrategy
          - .spec.dataFrom[].find.decodingStrategy
          - .spec.dataFrom[].find.nullBytePolicy
      # ValidatingWebhookConfigurations are mutated post-creation by:
      #   - the k8s API server (defaults matchPolicy, namespaceSelector, timeoutSeconds, service.port, scope)
      #   - the istiod controller (injects caBundle, flips failurePolicy Ignore→Fail)
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jqPathExpressions:
          - .webhooks[].clientConfig.caBundle
          - .webhooks[].failurePolicy
          - .webhooks[].matchPolicy
          - .webhooks[].namespaceSelector
          - .webhooks[].objectSelector
          - .webhooks[].timeoutSeconds
          - .webhooks[].clientConfig.service.port
          - .webhooks[].rules[].scope
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    parameters:
      - name: virtualServices.argocd.enabled
        value: "true"
      - name: virtualServices.argocd.host
        value: argocd.maklab.net
      - name: virtualServices.argocd.destination.host
        value: argo-cd-argocd-server.argocd.svc.cluster.local
      - name: virtualServices.argocd.destination.port
        value: "80"

  externalDns:
    enable: true
    name: external-dns
    syncWave: "4"
    helmPath: services/helm/external-dns
    destNamespace: external-dns
    selfHeal: true
    syncOptions:
      - CreateNamespace=true

  keda:
    enable: true
    name: keda
    syncWave: "4"
    helmPath: services/helm/keda
    destNamespace: keda
    argocdNamespace: argocd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  dbOperator:
    enable: true
    name: db-operator
    syncWave: "4"
    helmPath: services/helm/db-operator
    destNamespace: db-operator
    argocdNamespace: argocd
    argoProject: default
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retryLimit: 2
    retryMaxDuration: 3m
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/respect-existing: "true"
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jqPathExpressions:
          - .
    dopplerConfig: "svc_postgres"
    parameters:
      - name: persistence.storageClass
        value: "{{ .Values.storageClass }}"

  mongodb:
    enable: true
    name: mongodb
    syncWave: "4"
    helmPath: services/helm/mongodb
    destNamespace: mongodb
    argocdNamespace: argocd
    argoProject: default
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
    dopplerConfig: "svc_mongodb"
    parameters:
      - name: persistence.storageClass
        value: "{{ .Values.storageClass }}"

  # Wave 5 — deploy the other services
  kubePrometheusStack:
    enable: true
    name: kube-prometheus-stack
    syncWave: "5"
    helmPath: services/helm/kube-prometheus-stack
    destNamespace: kube-prometheus-stack
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    ignoreDifferences:
      - group: apps
        kind: DaemonSet
        name: kube-prometheus-stack-prometheus-node-exporter
        namespace: kube-prometheus-stack
        jsonPointers:
          - /spec/template/spec/containers/0/resources
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - .spec.dataFrom[].find.conversionStrategy
          - .spec.dataFrom[].find.decodingStrategy
          - .spec.dataFrom[].find.nullBytePolicy
    dopplerConfig: "svc_grafana"
    gateways:
      enable_public: true
      subdomain: grafana
      destination:
        serviceName: kube-prometheus-stack-grafana
        servicePort: 80

  cloudflareTunnel:
    enable: true
    name: cloudflare-tunnel
    syncWave: "5"
    helmPath: services/helm/cloudflare-tunnel
    destNamespace: cloudflare-tunnel
    selfHeal: true
    syncOptions:
      - CreateNamespace=true

  opencost:
    enable: true
    name: opencost
    syncWave: "5"
    helmPath: services/helm/opencost
    destNamespace: opencost
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    gateways:
      enable_public: true
      destination:
        port: 9090
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  headlamp:
    enable: true
    name: headlamp
    syncWave: "5"
    helmPath: services/helm/headlamp
    destNamespace: headlamp
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    gateways:
      enable_public: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  ramalama:
    enable: true
    name: ramalama
    syncWave: "5"
    helmPath: services/helm/ramalama
    destNamespace: ramalama
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  redisOperator:
    enable: false
    name: redis-operator
    syncWave: "5"
    helmPath: services/helm/redis-operator
    destNamespace: redis-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    environments:
      - production
      - staging
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
    parameters:
      - name: redis-cluster.persistence.storageClass
        value: "{{ .Values.storageClass }}"

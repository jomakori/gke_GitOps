# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ Global Values - shared values - passed in via DevOps repo (Terraform)                    │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
repoUrl: ""
path: ""
targetRevision: ""
region: ""
account: ""
clusterName: ""
clusterEndpoint: ""
storageClass: "csi-hostpath-sc"
grafanaCreds:
  admin:
  pw:
mongoDBCreds:
  host:
  user:
  pw:

# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ Service Values - individual values - passed in via DevOps repo (Terraform)               │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
dbOperator:
  enable: true
  creds:
    user:
    pw:

externalSecrets:
  enable: true
  serviceAccountName:

headlamp:
  enable: true

keda:
  enable: true

kubecost:
  enable: true

kubePrometheusStack:
  enable: true

metricsServer:
  enable: true

genericDevicePlugin:
  enable: true

ramalama:
  enable: true

redisOperator:
  enable: false
  environment:
    - production
    - staging

mongodb:
  enable: true

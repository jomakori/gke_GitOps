# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ Global Values - shared values - passed in via DevOps repo (Terraform)                    │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
repoUrl: ""
targetRevision: ""
storageClass: "local-path"
argoNamespace: ""
argoProject: ""
destinationServer: ""

grafanaCreds:
  admin:
  pw:

mongoDBCreds:
  host:
  user:
  pw:

dbOperator:
  creds:
    user:
    pw:

externalSecrets:
  serviceAccountName:

opencost:
  opencost:
    exporter:
      defaultClusterId:

redisOperator:
  pw:

# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ Service Configurations                                                                   │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
services:
  dbOperator:
    enable: true
    name: db-operator
    syncWave: "3"
    helmPath: services/helm/db-operator
    destNamespace: db-operator
    argocdNamespace: argocd
    argoProject: default
    skipCrds: true
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retryLimit: 2
    retryMaxDuration: 3m
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/respect-existing: "true"
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jqPathExpressions:
          - .
    parameters:
      - name: stackgres-operator.authentication.user
        value: "{{ .Values.dbOperator.creds.user }}"
      - name: stackgres-operator.authentication.password
        value: "{{ .Values.dbOperator.creds.pw }}"
      - name: stackgres-operator.grafana.user
        value: "{{ .Values.grafanaCreds.admin }}"
      - name: stackgres-operator.grafana.password
        value: "{{ .Values.grafanaCreds.pw }}"

  externalSecrets:
    enable: true
    name: external-secrets
    syncWave: "1"
    helmPath: services/helm/external-secrets
    destNamespace: external-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    parameters:
      - name: external-secrets.serviceAccount.name
        value: "{{ .Values.externalSecrets.serviceAccountName }}"

  genericDevicePlugin:
    enable: true
    name: generic-device-plugin
    syncWave: "0"
    helmPath: services/helm/generic-device-plugin
    destNamespace: kube-system
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  headlamp:
    enable: true
    name: headlamp
    syncWave: "4"
    helmPath: services/helm/headlamp
    destNamespace: headlamp
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  keda:
    enable: true
    name: keda
    syncWave: "2"
    helmPath: services/helm/keda
    destNamespace: keda
    argocdNamespace: argocd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  kubePrometheusStack:
    enable: true
    name: kube-prometheus-stack
    syncWave: "1"
    helmPath: services/helm/kube-prometheus-stack
    destNamespace: kube-prometheus-stack
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
    ignoreDifferences:
      - group: apps
        kind: DaemonSet
        name: kube-prometheus-stack-prometheus-node-exporter
        namespace: kube-prometheus-stack
        jsonPointers:
          - /spec/template/spec/containers/0/resources
    parameters:
      - name: kube-prometheus-stack.grafana.adminUser
        value: "{{ .Values.grafanaCreds.admin }}"
      - name: kube-prometheus-stack.grafana.adminPassword
        value: "{{ .Values.grafanaCreds.pw }}"

  metricsServer:
    enable: true
    name: metrics-server
    syncWave: "0"
    helmPath: services/helm/metrics-server
    destNamespace: kube-system
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - Replace=true

  mongodb:
    enable: true
    name: mongodb
    syncWave: "4"
    helmPath: services/helm/mongodb
    destNamespace: mongodb
    argocdNamespace: argocd
    argoProject: default
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
    parameters:
      - name: auth.username
        value: "{{ .Values.mongoDBCreds.user }}"
      - name: auth.password
        value: "{{ .Values.mongoDBCreds.pw }}"
      - name: auth.database
        value: "{{ .Values.mongoDBCreds.user }}"
      - name: persistence.storageClass
        value: "{{ .Values.storageClass }}"

  opencost:
    enable: true
    name: opencost
    syncWave: "5"
    helmPath: services/helm/opencost
    destNamespace: opencost
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    parameters:
      - name: clusterName
        value: "{{ .Values.opencost.opencost.exporter.defaultClusterId }}"

  ramalama:
    enable: true
    name: ramalama
    syncWave: "6"
    helmPath: services/helm/ramalama
    destNamespace: ramalama
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  redisOperator:
    enable: false
    name: redis-operator
    syncWave: "3"
    helmPath: services/helm/redis-operator
    destNamespace: redis-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    environments:
      - production
      - staging
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
    parameters:
      - name: redis-cluster.password
        value: "{{ .Values.redisOperator.pw }}"
      - name: redis-cluster.persistence.storageClass
        value: "{{ .Values.storageClass }}"

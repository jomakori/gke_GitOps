# Global Values - shared values - passed in via DevOps repo (Terraform)
argoNamespace: ""
argoProject: ""
clusterDomain: ""
clusterName: ""
clusterServer: ""
repoUrl: ""
storageClass:
targetRevision: ""

# Service Configurations
services:
  # Wave 0 — no deps
  metricsServer:
    enable: true
    name: metrics-server
    syncWave: "0"
    helmPath: services/helm/metrics-server
    destNamespace: kube-system
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - Replace=true

  genericDevicePlugin:
    enable: true
    name: generic-device-plugin
    syncWave: "0"
    helmPath: services/helm/generic-device-plugin
    destNamespace: kube-system
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  kubePrometheusStack:
    enable: true
    name: kube-prometheus-stack
    syncWave: "0"
    helmPath: services/helm/kube-prometheus-stack
    destNamespace: kube-prometheus-stack
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
    ignoreDifferences:
      - group: apps
        kind: DaemonSet
        name: kube-prometheus-stack-prometheus-node-exporter
        namespace: kube-prometheus-stack
        jsonPointers:
          - /spec/template/spec/containers/0/resources
    dopplerConfig: "svc_grafana"

  # Wave 1 — Istio CRDs + secret engine
  istioBase:
    enable: true
    name: istio-base
    syncWave: "1"
    helmPath: services/helm/istio-base
    destNamespace: istio-system
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  externalSecrets:
    enable: true
    name: external-secrets
    syncWave: "1"
    helmPath: services/helm/external-secrets
    destNamespace: external-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    parameters:
      - name: external-secrets.serviceAccount.name
        value: "{{ .Values.externalSecrets.serviceAccountName }}"

  # Wave 2 — needs wave 1: istiod←istio-base CRDs, cert-manager before istio-config
  istiod:
    enable: true
    name: istiod
    syncWave: "2"
    helmPath: services/helm/istiod
    destNamespace: istio-system
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  certManager:
    enable: true
    name: cert-manager
    syncWave: "2"
    helmPath: services/helm/cert-manager
    destNamespace: cert-manager
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  # Wave 3 — ingressgateway needs istiod (wave 2)
  istioIngressgateway:
    enable: true
    name: istio-ingressgateway
    syncWave: "3"
    helmPath: services/helm/istio-ingressgateway
    destNamespace: istio-system
    selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Wave 4 — istio-config needs cert-manager + ingressgateway + cloudflare secret; data services run in parallel
  istioConfig:
    enable: true
    name: istio-config
    syncWave: "4"
    helmPath: services/helm/istio-config
    destNamespace: istio-system
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    dopplerConfig: "svc_cloudflare"

  externalDns:
    enable: true
    name: external-dns
    syncWave: "4"
    helmPath: services/helm/external-dns
    destNamespace: external-dns
    selfHeal: true
    syncOptions:
      - CreateNamespace=true

  keda:
    enable: true
    name: keda
    syncWave: "4"
    helmPath: services/helm/keda
    destNamespace: keda
    argocdNamespace: argocd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  dbOperator:
    enable: true
    name: db-operator
    syncWave: "4"
    helmPath: services/helm/db-operator
    destNamespace: db-operator
    argocdNamespace: argocd
    argoProject: default
    skipCrds: true
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retryLimit: 2
    retryMaxDuration: 3m
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/respect-existing: "true"
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jqPathExpressions:
          - .
    dopplerConfig: "svc_postgres"
    parameters:
      - name: persistence.storageClass
        value: "{{ .Values.storageClass }}"

  mongodb:
    enable: true
    name: mongodb
    syncWave: "4"
    helmPath: services/helm/mongodb
    destNamespace: mongodb
    argocdNamespace: argocd
    argoProject: default
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
    dopplerConfig: "svc_mongodb"
    parameters:
      - name: persistence.storageClass
        value: "{{ .Values.storageClass }}"

  # Wave 5 — deploy the other services
  opencost:
    enable: true
    name: opencost
    syncWave: "5"
    helmPath: services/helm/opencost
    destNamespace: opencost
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    parameters:
      - name: clusterName
        value: "{{ .Values.opencost.opencost.exporter.defaultClusterId }}"

  headlamp:
    enable: true
    name: headlamp
    syncWave: "5"
    helmPath: services/helm/headlamp
    destNamespace: headlamp
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  ramalama:
    enable: true
    name: ramalama
    syncWave: "5"
    helmPath: services/helm/ramalama
    destNamespace: ramalama
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    syncOptions:
      - CreateNamespace=true
      - Replace=true

  redisOperator:
    enable: false
    name: redis-operator
    syncWave: "5"
    helmPath: services/helm/redis-operator
    destNamespace: redis-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    environments:
      - production
      - staging
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
    parameters:
      - name: redis-cluster.persistence.storageClass
        value: "{{ .Values.storageClass }}"

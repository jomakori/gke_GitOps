apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: notes-app
  namespace: notes-app
spec:
  host: notes-app.notes-app.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 1000
        maxRetries: 3

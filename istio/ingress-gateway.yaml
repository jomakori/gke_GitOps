apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-ingress
  namespace: istio-system
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        credentialName: shared-ingress-cert
      allowedRoutes:
        namespaces:
          from: All

# Global Values - shared values - passed in via DevOps repo (Terraform)
argoNamespace: ""
argoProject: ""
clusterDomain: ""
clusterName: ""
clusterServer: ""
repoUrl: ""
storageClass: ""
targetRevision: ""

# App Environment Values — dopplerConfig maps to ClusterSecretStore/doppler-{name}
demoApi:
  environment:
    staging:
      dopplerConfig: demo-api-staging
    production:
      dopplerConfig: demo-api-prod

notesUi:
  environment:
    staging:
      dopplerConfig: notes-ui-staging
    production:
      dopplerConfig: notes-ui-prod

# App Configurations — key = app name (used for Application metadata.name + chart lookup)
apps:
  demoApi:
    enable: false
    syncWave: "0"
    helmPath: apps/helm/
    destNamespace: argocd
    argocdNamespace: argocd
    argoProject: default
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    gateways:
      enable_public: true
    syncOptions:
      - CreateNamespace=true
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/replicas
      - group: apps
        kind: Secret
        jsonPointers:
          - /metadata/argocd.argoproj.io/sync-wave
    parameters:
      - name: appName
        value: "demoApi"
      - name: demoApi.environments.staging.dopplerConfig
        value: "{{ .Values.demoApi.environment.staging.dopplerConfig }}"
      - name: demoApi.environments.production.dopplerConfig
        value: "{{ .Values.demoApi.environment.production.dopplerConfig }}"

  notesUi:
    enable: false
    syncWave: "0"
    helmPath: apps/helm/
    destNamespace: argocd
    argocdNamespace: argocd
    argoProject: default
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    gateways:
      enable_public: true
    syncOptions:
      - CreateNamespace=true
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/replicas
      - group: apps
        kind: Secret
        jsonPointers:
          - /metadata/argocd.argoproj.io/sync-wave
    parameters:
      - name: appName
        value: "notesUi"
      - name: notesUi.environments.staging.dopplerConfig
        value: "{{ .Values.notesUi.environment.staging.dopplerConfig }}"
      - name: notesUi.environments.production.dopplerConfig
        value: "{{ .Values.notesUi.environment.production.dopplerConfig }}"

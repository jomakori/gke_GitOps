# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ Global Values - shared values - passed in via DevOps repo (Terraform)                    │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
repoUrl: ""
targetRevision: ""
storageClass: "csi-hostpath-sc"
argoNamespace: ""
argoProject: ""
destinationServer: ""

# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ App Environment Values - per-app env config - injected by Terraform                      │
# │ Keys match the apps keys below — used for dopplerToken injection.                        │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
demoApi:
  environment:
    staging:
      dopplerToken: ""
    production:
      dopplerToken: ""

notesUi:
  environment:
    staging:
      dopplerToken: ""
    production:
      dopplerToken: ""

# ┌──────────────────────────────────────────────────────────────────────────────────────────┐
# │ App Configurations — key = app name (used for Application metadata.name + chart lookup)  │
# └──────────────────────────────────────────────────────────────────────────────────────────┘
apps:
  demoApi:
    enable: false
    syncWave: "0"
    helmPath: apps/helm/
    destNamespace: argocd
    argocdNamespace: argocd
    argoProject: default
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/replicas
      - group: apps
        kind: Secret
        jsonPointers:
          - /metadata/argocd.argoproj.io/sync-wave
    parameters:
      - name: appName
        value: "demoApi"
      - name: demoApi.environments.staging.dopplerToken
        value: "{{ .Values.demoApi.environment.staging.dopplerToken }}"
      - name: demoApi.environments.production.dopplerToken
        value: "{{ .Values.demoApi.environment.production.dopplerToken }}"

  notesUi:
    enable: false
    syncWave: "0"
    helmPath: apps/helm/
    destNamespace: argocd
    argocdNamespace: argocd
    argoProject: default
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    selfHeal: true
    syncOptions:
      - CreateNamespace=true
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jsonPointers:
          - /spec/replicas
      - group: apps
        kind: Secret
        jsonPointers:
          - /metadata/argocd.argoproj.io/sync-wave
    parameters:
      - name: appName
        value: "notesUi"
      - name: notesUi.environments.staging.dopplerToken
        value: "{{ .Values.notesUi.environment.staging.dopplerToken }}"
      - name: notesUi.environments.production.dopplerToken
        value: "{{ .Values.notesUi.environment.production.dopplerToken }}"
